<section id="compilations" style="background: var(--navy-medium); padding: 80px 0;">
    <div class="container">
        <!-- The Beautiful Header you created -->
        <div class="section-header" style="text-align: center; margin-bottom: 40px;">
            <span class="section-badge" style="color: var(--primary-gold); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Curated Memories</span>
            <h2 class="section-title" style="font-size: 2.5rem; margin-top: 10px;">Memory <span class="highlight" style="color: var(--primary-gold);">Compilations</span></h2>
            <p class="section-description" style="color: #aaa; margin-top: 10px;">Watch special slideshows created from the best moments.</p>
        </div>

        <!-- The Grid where Javascript will automatically load the items -->
        <div class="compilations-grid" id="publicCompilationsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px;">
            <!-- Compilations will load here automatically -->
        </div>
    </div>

<script>
/* === SNIPER_PATCH_V3_START === */
(function(){
  if (window.__SNIPER_PATCH_V3__) return;
  window.__SNIPER_PATCH_V3__ = true;

  const MUSIC_DEFAULTS = {
    ambientSiteMusic: '',
    leanBackMusic: '',
    lastBellMusic: '',
    globeMusic: '',
    boomboxGraduationVibes: '',
    boomboxSadBoiHours: '',
    boomboxHype: ''
  };

  function sniperV3Apply(){
    moveStereoBeforeFooter();
    convertBoomboxToButtons();
    patchMemoryOnlyNotes();
    patchBetterPlanes();
    patchMusicSettings();
    patchLeanBackMusic();
    patchAmbient24x7Music();
    patchLastBellMusic();
    patchDistanceMapMusic();
    shrinkFloatingButtons();
  }

  function moveStereoBeforeFooter(){
    const dock = document.getElementById('boomboxDock');
    const footer = document.querySelector('footer');
    if (!dock || !footer) return;
    if (dock.dataset.v3Moved === '1') return;
    dock.dataset.v3Moved = '1';
    dock.classList.add('sniper-inline-bottom');
    footer.parentNode.insertBefore(dock, footer);

    if (!document.getElementById('sniperMusicHint')){
      const hint = document.createElement('div');
      hint.id = 'sniperMusicHint';
      hint.textContent = 'Music controls';
      dock.insertAdjacentElement('afterend', hint);
    }
  }

  function resolveMusicPath(value){
    if (!value) return '';
    if (/^https?:\/\//i.test(value) || value.startsWith('/')) return value;
    return '/music/' + String(value).replace(/^\/+/, '');
  }

  function getMusicSettings(){
    const s = (window.state && window.state.settings) ? window.state.settings : {};
    return Object.assign({}, MUSIC_DEFAULTS, s.music || {});
  }

  function stopAudioRef(refName){
    const st = window.sniperState || window.__sniperStateFallback || {};
    const a = st[refName];
    if (a && typeof a.pause === 'function'){
      try { a.pause(); } catch(_){}
      st[refName] = null;
    }
  }

  function playNamedAudio(refName, src, loop, volume){
    const st = window.sniperState || window.__sniperStateFallback || (window.__sniperStateFallback = {});
    stopAudioRef(refName);
    if (!src) return null;
    try{
      const a = new Audio(src);
      a.loop = !!loop;
      a.volume = typeof volume === 'number' ? volume : 1;
      a.play().catch(()=>{});
      st[refName] = a;
      return a;
    }catch(_){
      return null;
    }
  }

  function convertBoomboxToButtons(){
    const rack = document.getElementById('cassetteRack');
    const door = document.getElementById('boomboxDoor');
    if (!rack || !door || rack.dataset.v3Ready === '1') return;
    rack.dataset.v3Ready = '1';
    rack.innerHTML = '';

    const defs = [
      { key: 'boomboxGraduationVibes', label: 'Graduation Vibes' },
      { key: 'boomboxSadBoiHours', label: 'Sad Boi Hours' },
      { key: 'boomboxHype', label: 'Hype' }
    ];

    defs.forEach(def => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cassette';
      btn.textContent = def.label;
      btn.addEventListener('click', () => {
        const music = getMusicSettings();
        const src = resolveMusicPath(music[def.key]);
        if (!src) {
          if (window.showNotification) showNotification('info', 'Music missing', def.label + ' has not been configured yet.');
          return;
        }
        door.classList.add('has-tape');
        door.innerHTML = '<div style="text-align:center;"><div style="font-weight:700;color:var(--primary-gold);">' + def.label + '</div><div style="opacity:.7;font-size:.82rem;">Now playing</div></div>';
        playNamedAudio('boomboxAudio', src, true, 0.32);
      });
      rack.appendChild(btn);
    });

    const eject = document.getElementById('ejectTapeBtn');
    if (eject && !eject.dataset.v3Bound){
      eject.dataset.v3Bound = '1';
      eject.addEventListener('click', () => {
        door.classList.remove('has-tape');
        door.textContent = 'Choose a vibe';
        stopAudioRef('boomboxAudio');
      });
    }

    if (door.textContent.trim().toLowerCase().includes('drag a tape')){
      door.textContent = 'Choose a vibe';
    }
  }

  function patchMemoryOnlyNotes(){
    const btn = document.getElementById('sendNoteBtn');
    if (!btn || btn.dataset.v3Bound === '1') return;
    btn.dataset.v3Bound = '1';
    btn.onclick = null;
    btn.addEventListener('click', async () => {
      const memories = ((window.state && window.state.memories) || []).filter(m => m && m.id && (m.caption || '').trim());
      if (!memories.length){
        if (window.showNotification) showNotification('info', 'No memories available', 'A note can only be sent from an approved memory.');
        return;
      }
      const random = memories[Math.floor(Math.random() * memories.length)];
      try{
        await fetch(apiUrl('/api/paper-notes/from-memory'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ memoryId: random.id })
        });
      }catch(_){}
      launchMemoryPlane(random);
    });
  }

  function launchMemoryPlane(memory){
    const layer = document.getElementById('paperAirplaneLayer');
    if (!layer) return;
    const plane = makePlaneNode(memory);
    layer.appendChild(plane);

    let x = 30;
    let y = window.innerHeight - 120;
    let vx = 8.8;
    let vy = -6.6;
    let rot = -10;
    let frames = 0;

    const step = () => {
      x += vx;
      y += vy;
      vy += 0.055;
      rot = Math.max(-18, Math.min(28, rot + 0.18));
      frames += 1;
      plane.style.left = x + 'px';
      plane.style.top = y + 'px';
      plane.style.transform = 'rotate(' + rot + 'deg)';

      if (x > window.innerWidth + 120 || y < -120 || frames > 320){
        plane.remove();
        return;
      }
      requestAnimationFrame(step);
    };
    step();
  }

  function patchBetterPlanes(){
    const oldIncoming = window.flyIncomingPlane;
    if (typeof oldIncoming !== 'function' || oldIncoming.__v3Wrapped) return;
    window.flyIncomingPlane = function(payload){
      const layer = document.getElementById('paperAirplaneLayer');
      if (!layer) return;
      const note = typeof payload === 'string' ? { text: payload } : (payload || {});
      const plane = makePlaneNode(note);
      layer.appendChild(plane);

      let x = -90;
      let baseY = 90 + Math.random() * Math.min(window.innerHeight * 0.45, 280);
      let t = 0;
      let vx = 3.2 + Math.random() * 1.8;

      const step = () => {
        t += 0.035;
        x += vx;
        const y = baseY + Math.sin(t * 2.2) * 18 + Math.cos(t * 1.1) * 8;
        const angle = Math.sin(t * 2.2) * 8 - 8;
        plane.style.left = x + 'px';
        plane.style.top = y + 'px';
        plane.style.transform = 'rotate(' + angle + 'deg)';
        if (x > window.innerWidth + 120){
          plane.remove();
          return;
        }
        requestAnimationFrame(step);
      };

      plane.addEventListener('click', () => {
        const text = note.caption || note.text || 'A memory from someone.';
        alert(text);
        plane.remove();
      });

      step();
    };
    window.flyIncomingPlane.__v3Wrapped = true;
  }

  function makePlaneNode(note){
    const plane = document.createElement('div');
    plane.className = 'paper-plane';
    plane.title = 'Catch this memory';
    plane.innerHTML = '<div class="plane-fold"></div><div class="plane-memory-badge">MEMORY</div>';
    plane.dataset.caption = note.caption || note.text || '';
    return plane;
  }

  function patchMusicSettings(){
    const original = window.renderSettingsPanelHtml;
    if (typeof original !== 'function' || original.__v3MusicWrapped) return;

    window.renderSettingsPanelHtml = function(){
      const html = original.apply(this, arguments);
      if (html.includes('sniperMusicAdminPanel')) return html;
      const inject = `
      <div id="sniperMusicAdminPanel" style="margin-top:16px; border:1px solid var(--glass-border); border-radius:16px; padding:14px; background:rgba(255,255,255,0.03);">
        <h4 style="font-family:var(--font-display); color:var(--primary-gold); margin-bottom:10px;">Music Configuration</h4>
        <p class="mini-pill" style="margin-bottom:10px;">Put music files in the root <strong>music</strong> folder. Enter file names like <strong>ambient.mp3</strong>.</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-group"><label>24/7 Site Music</label><input class="form-input" id="setMusicAmbientSiteMusic" placeholder="ambient.mp3" /></div>
          <div class="form-group"><label>Lean Back Music</label><input class="form-input" id="setMusicLeanBackMusic" placeholder="leanback.mp3" /></div>
          <div class="form-group"><label>Last Bell Music</label><input class="form-input" id="setMusicLastBellMusic" placeholder="lastbell.mp3" /></div>
          <div class="form-group"><label>Globe / Distance Music</label><input class="form-input" id="setMusicGlobeMusic" placeholder="globe.mp3" /></div>
          <div class="form-group"><label>Boombox: Graduation Vibes</label><input class="form-input" id="setMusicBoomboxGraduationVibes" placeholder="graduation.mp3" /></div>
          <div class="form-group"><label>Boombox: Sad Boi Hours</label><input class="form-input" id="setMusicBoomboxSadBoiHours" placeholder="sadboi.mp3" /></div>
          <div class="form-group"><label>Boombox: Hype</label><input class="form-input" id="setMusicBoomboxHype" placeholder="hype.mp3" /></div>
        </div>
      </div>`;
      return html.replace('</div></div></div>', inject + '</div></div></div>');
    };

    window.renderSettingsPanelHtml.__v3MusicWrapped = true;

    const originalRead = window.readSettingsFromEditor;
    if (typeof originalRead === 'function' && !originalRead.__v3MusicWrapped){
      window.readSettingsFromEditor = function(){
        const s = originalRead.apply(this, arguments);
        s.music = {
          ambientSiteMusic: document.getElementById('setMusicAmbientSiteMusic')?.value?.trim() || '',
          leanBackMusic: document.getElementById('setMusicLeanBackMusic')?.value?.trim() || '',
          lastBellMusic: document.getElementById('setMusicLastBellMusic')?.value?.trim() || '',
          globeMusic: document.getElementById('setMusicGlobeMusic')?.value?.trim() || '',
          boomboxGraduationVibes: document.getElementById('setMusicBoomboxGraduationVibes')?.value?.trim() || '',
          boomboxSadBoiHours: document.getElementById('setMusicBoomboxSadBoiHours')?.value?.trim() || '',
          boomboxHype: document.getElementById('setMusicBoomboxHype')?.value?.trim() || ''
        };
        return s;
      };
      window.readSettingsFromEditor.__v3MusicWrapped = true;
    }

    const originalSync = window.syncSettingsEditor;
    if (typeof originalSync === 'function' && !originalSync.__v3MusicWrapped){
      window.syncSettingsEditor = function(){
        originalSync.apply(this, arguments);
        const music = getMusicSettings();
        const set = (id, val) => {
          const el = document.getElementById(id);
          if (el) el.value = val || '';
        };
        set('setMusicAmbientSiteMusic', music.ambientSiteMusic);
        set('setMusicLeanBackMusic', music.leanBackMusic);
        set('setMusicLastBellMusic', music.lastBellMusic);
        set('setMusicGlobeMusic', music.globeMusic);
        set('setMusicBoomboxGraduationVibes', music.boomboxGraduationVibes);
        set('setMusicBoomboxSadBoiHours', music.boomboxSadBoiHours);
        set('setMusicBoomboxHype', music.boomboxHype);
      };
      window.syncSettingsEditor.__v3MusicWrapped = true;
    }
  }

  function patchLeanBackMusic(){
    const oldStart = window.startLeanBackMode;
    const oldStop = window.stopLeanBackMode;
    if (typeof oldStart === 'function' && !oldStart.__v3MusicWrapped){
      window.startLeanBackMode = function(){
        const out = oldStart.apply(this, arguments);
        const music = getMusicSettings();
        const src = resolveMusicPath(music.leanBackMusic);
        if (src) playNamedAudio('movieAudio', src, true, 0.38);
        return out;
      };
      window.startLeanBackMode.__v3MusicWrapped = true;
    }
    if (typeof oldStop === 'function' && !oldStop.__v3MusicWrapped){
      window.stopLeanBackMode = function(){
        const out = oldStop.apply(this, arguments);
        stopAudioRef('movieAudio');
        restartAmbientIfNeeded();
        return out;
      };
      window.stopLeanBackMode.__v3MusicWrapped = true;
    }
  }

  function patchAmbient24x7Music(){
    if (window.__sniperAmbientV3Bound) return;
    window.__sniperAmbientV3Bound = true;
    setTimeout(restartAmbientIfNeeded, 1200);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) restartAmbientIfNeeded();
    });

    const oldCloseCompilation = window.closeCompilationPlayer;
    if (typeof oldCloseCompilation === 'function' && !oldCloseCompilation.__v3AmbientWrapped){
      window.closeCompilationPlayer = function(){
        const out = oldCloseCompilation.apply(this, arguments);
        restartAmbientIfNeeded();
        return out;
      };
      window.closeCompilationPlayer.__v3AmbientWrapped = true;
    }
  }

  function restartAmbientIfNeeded(){
    const music = getMusicSettings();
    const src = resolveMusicPath(music.ambientSiteMusic);
    if (!src) return;
    if (document.body.classList.contains('sniper-ui-hidden')) return;
    const bell = document.getElementById('sniperLastBell');
    if (bell && bell.classList.contains('active')) return;
    playNamedAudio('ambientAudio', src, true, 0.22);
  }

  function patchLastBellMusic(){
    const old = window.triggerLastBell;
    if (typeof old !== 'function' || old.__v3BellWrapped) return;
    window.triggerLastBell = function(){
      stopAudioRef('ambientAudio');
      const out = old.apply(this, arguments);
      const music = getMusicSettings();
      const src = resolveMusicPath(music.lastBellMusic);
      if (src) playNamedAudio('finalBellAudio', src, true, 0.34);
      return out;
    };
    window.triggerLastBell.__v3BellWrapped = true;
  }

  function patchDistanceMapMusic(){
    const btn = document.getElementById('destinationLaunchBtn');
    if (!btn || btn.dataset.v3MusicBound === '1') return;
    btn.dataset.v3MusicBound = '1';
    btn.addEventListener('click', () => {
      const music = getMusicSettings();
      const src = resolveMusicPath(music.globeMusic);
      if (src) playNamedAudio('globeAudio', src, false, 0.42);
    });
  }

  function shrinkFloatingButtons(){
    const g = document.getElementById('ghostCursorToggle');
    const s = document.getElementById('sendNoteBtn');
    if (g) g.textContent = 'Ghost';
    if (s) s.textContent = 'Note';
  }

  const oldFetchRandom = window.fetchPaperPlane;
  if (typeof oldFetchRandom === 'function' && !oldFetchRandom.__v3MemoryOnlyWrapped){
    window.fetchPaperPlane = async function(){
      try{
        const res = await fetch(apiUrl('/api/paper-notes/random-memory'));
        const data = await res.json();
        if (data.success && data.note){
          flyIncomingPlane(data.note);
        }
      }catch(_){}
    };
    window.fetchPaperPlane.__v3MemoryOnlyWrapped = true;
  }

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', sniperV3Apply);
  } else {
    sniperV3Apply();
  }
})();
</script>
</section>
