<section id="distanceMapSection">
  <div class="container">
    <div class="section-header">
      <span class="section-badge">Erase the Distance</span>
      <h2 class="section-title">One <span class="highlight">Starting Point</span>, Many Destinations</h2>
      <p class="section-description">No matter where everyone goes next, it all began here.</p>
    </div>
    <div id="distanceControls">
      <select class="form-select" id="destinationSelect" style="max-width:320px;">
        <option value="">Choose your future destination</option>
      </select>
      <button class="btn btn-primary" type="button" id="destinationLaunchBtn">Show the Globe</button>
    </div>
    <div id="distanceMapWrap">
      <div id="distanceGlobe">
        <div class="distance-school-dot"></div>
      </div>
    </div>
  </div>
</section>
