<section id="songDedicationsSection" class="ff-section-hidden">
  <div class="container">
    <div class="section-header">
      <span class="section-badge">Musical Moments</span>
      <h2 class="section-title">Song <span class="highlight">Dedications</span></h2>
      <p class="section-description">Dedicate a song to a friend, a memory, or the whole class.</p>
    </div>
    <div class="ff-form-box">
      <div class="ff-grid-2">
        <div><label class="ff-label">From</label><input class="ff-input" id="dedFrom" placeholder="Your name" maxlength="60"/></div>
        <div><label class="ff-label">Dedicated To</label><input class="ff-input" id="dedTo" placeholder="A person or 'The whole class'" maxlength="80"/></div>
      </div>
      <label class="ff-label">Song Name & Artist</label>
      <input class="ff-input" id="dedSong" placeholder="e.g. Good Riddance – Green Day" maxlength="120" style="margin-bottom:14px;"/>
      <label class="ff-label">Why this song? (optional)</label>
      <textarea class="ff-input" id="dedMsg" placeholder="What does this song mean to you?" maxlength="240" style="min-height:72px;"></textarea>
      <button class="ff-submit-btn" type="button" onclick="submitDedication()">Dedicate This Song 🎵</button>
    </div>
    <div class="dedications-list" id="dedicationsList"><div class="ff-empty">No dedications yet. Be first!</div></div>
  </div>
</section>
