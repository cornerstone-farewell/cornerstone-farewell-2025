<section id="gratitudeWall" class="ff-section-hidden">
  <div class="container">
    <div class="section-header">
      <span class="section-badge">Appreciation Corner</span>
      <h2 class="section-title">Gratitude <span class="highlight">Wall</span></h2>
      <p class="section-description">Leave a sticky note of thanks for someone who made your journey special.</p>
    </div>
    <div class="ff-form-box">
      <div class="ff-grid-2">
        <div><label class="ff-label">From</label><input class="ff-input" id="gwFrom" placeholder="Your name" maxlength="60"/></div>
        <div><label class="ff-label">To</label><input class="ff-input" id="gwTo" placeholder="Who's this for?" maxlength="60"/></div>
      </div>
      <label class="ff-label">Your message</label>
      <textarea class="ff-input" id="gwMsg" placeholder="What would you like them to know? 💛" maxlength="280"></textarea>
      <button class="ff-submit-btn" type="button" onclick="submitGratitudeNote()">Post Sticky Note 📌</button>
    </div>
    <div class="gratitude-grid" id="gratitudeGrid"><div class="ff-empty">No sticky notes yet.</div></div>
  </div>
</section>
