<!-- FRAGMENT: gratitude -->
<style data-fragment-style="gratitude">
#gratitudeWall{background:linear-gradient(180deg,var(--navy-dark) 0%,#10182a 100%)}.gratitude-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}.sticky-note{position:relative;padding:20px 18px 28px;border-radius:16px;min-height:160px;backdrop-filter:blur(16px);transition:transform .3s ease,box-shadow .3s ease;cursor:default;display:flex;flex-direction:column;gap:10px;animation:stickyDrop .6s cubic-bezier(.34,1.56,.64,1) both;--r:0deg}.sticky-note::before{content:"";position:absolute;inset:0;border-radius:16px;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 100%);pointer-events:none}.sticky-note:hover{transform:scale(1.05) translateY(-6px) rotate(0deg)!important;z-index:2}.sticky-note .s-from{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}.sticky-note .s-to{font-size:.8rem;opacity:.6}.sticky-note .s-msg{font-size:.95rem;line-height:1.55;flex:1}.sticky-note .s-heart{position:absolute;bottom:10px;right:14px;font-size:1.1rem}
</style>

<section class="ff-section-hidden" id="gratitudeWall">
<div class="container">
<div class="section-header">
<span class="section-badge">Appreciation Corner</span>
<h2 class="section-title">Gratitude <span class="highlight">Wall</span></h2>
<p class="section-description">Leave a sticky note of thanks for someone who made your journey special.</p>
</div>
<div class="ff-form-box">
<div class="ff-grid-2">
<div><label class="ff-label">From</label><input class="ff-input" id="gwFrom" maxlength="60" placeholder="Your name"/></div>
<div><label class="ff-label">To</label><input class="ff-input" id="gwTo" maxlength="60" placeholder="Who's this for?"/></div>
</div>
<label class="ff-label">Your message</label>
<textarea class="ff-input" id="gwMsg" maxlength="280" placeholder="What would you like them to know? "></textarea>
<button class="ff-submit-btn" onclick="submitGratitudeNote()" type="button">Post Sticky Note </button>
</div>
<div class="gratitude-grid" id="gratitudeGrid"><div class="ff-empty">No sticky notes yet.</div></div>
</div>
</section>

<script data-fragment-script="gratitude">
(function(){
 const STICKY_COLORS=[{bg:'rgba(0,255,200,.08)',text:'#00ffc8',border:'#00ffc8'},{bg:'rgba(180,100,255,.08)',text:'#c87aff',border:'#c87aff'},{bg:'rgba(255,200,0,.08)',text:'#ffd700',border:'#ffd700'},{bg:'rgba(0,180,255,.08)',text:'#00b4ff',border:'#00b4ff'},{bg:'rgba(255,80,160,.08)',text:'#ff50a0',border:'#ff50a0'},{bg:'rgba(80,255,120,.08)',text:'#50ff78',border:'#50ff78'}];
 
 function ffEsc(t){const d=document.createElement('div');d.textContent=String(t??'');return d.innerHTML}
 function ffApi(p){if(typeof apiUrl==='function')return apiUrl(p);return p;}
 async function ffGet(p){const r=await fetch(ffApi(p));return r.json()}
 async function ffPost(p,body){const r=await fetch(ffApi(p),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json()}
 function ffNotify(t,title,msg){if(typeof showNotification==='function')showNotification(t,title,msg)}

 async function loadGratitudeNotes(){
 const g=document.getElementById('gratitudeGrid');if(!g)return;
 try {
 const d = await ffGet('/api/fun/gratitude');
 // FIXED: Changed d.notes to d.entries to match server.js
 if (d.success && d.entries?.length) {
 g.innerHTML = d.entries.map((n,i) => {
 const c = STICKY_COLORS[i%STICKY_COLORS.length];
 const r = ((i*7+3)%5)-2;
 return `<div class="sticky-note" style="background:${c.bg};color:${c.text};--r:${r}deg;border:1px solid ${c.border};box-shadow:0 0 18px ${c.border}44,inset 0 0 8px ${c.border}11;backdrop-filter:blur(12px);"><div class="s-from" style="color:${c.border};text-shadow:0 0 8px ${c.border};">From: ${ffEsc(n.from||n.from_name||'Anonymous')}</div><div class="s-to" style="color:${c.text}88;">For ${ffEsc(n.to||n.to_name||'Everyone')}</div><div class="s-msg">${ffEsc(n.message)}</div><div class="s-heart" style="filter:drop-shadow(0 0 6px ${c.border});">⬡</div></div>`;
 }).join('');
 } else {
 g.innerHTML='<div class="ff-empty">No sticky notes yet — be first! </div>';
 }
 } catch(_) { g.innerHTML='<div class="ff-empty">No sticky notes yet — be first! </div>'; }
 }

 window.submitGratitudeNote = async function(){
 const from = document.getElementById('gwFrom')?.value?.trim();
 const to = document.getElementById('gwTo')?.value?.trim();
 const msg = document.getElementById('gwMsg')?.value?.trim();
 if(!from) return ffNotify('error','Missing','Please enter your name.');
 if(!to) return ffNotify('error','Missing','Who is this note for?');
 if(!msg) return ffNotify('error','Missing','Write something kind!');
 
 try {
 const d = await ffPost('/api/fun/gratitude', {from, to, message:msg});
 if(d.success) {
 document.getElementById('gwFrom').value='';
 document.getElementById('gwTo').value='';
 document.getElementById('gwMsg').value='';
 ffNotify('success','Posted!','Your sticky note is on the wall ');
 if(typeof triggerConfetti==='function') triggerConfetti();
 loadGratitudeNotes();
 } else ffNotify('error','Failed',d.error);
 } catch(e){ ffNotify('error','Error',e.message); }
 };

 // Load toggle settings
 window.__FF_LOADED__ = true;
 const FF_DEFAULTS = {gratitudeWall:true,superlatives:true,wishJar:true,songDedications:true,moodBoard:true,timeCapsule:true,seniorAdvice:true,memoryMosaic:false};
 async function loadFunFeatureToggles(){
 let t=Object.assign({},FF_DEFAULTS);
 try{const d=await ffGet('/api/fun/settings');if(d.success&&d.settings)t=Object.assign(t,d.settings)}catch(_){}
 window.__FF_TOGGLES__=t;
 const map={gratitudeWall:'gratitudeWall',superlatives:'superlativesSection',wishJar:'wishJarSection',songDedications:'songDedicationsSection',moodBoard:'moodBoardSection',timeCapsule:'timeCapsuleSection',seniorAdvice:'adviceWall',memoryMosaic:'memoryMosaicSection'};
 for(const[k,id]of Object.entries(map)){const el=document.getElementById(id);if(el)el.classList.toggle('ff-section-hidden',!t[k])}
 }

 document.addEventListener('DOMContentLoaded', async () => {
 await loadFunFeatureToggles();
 loadGratitudeNotes();
 });
})();
</script>
