<section id="adviceWall">
  <div class="container">
    <div class="section-header">
      <span class="section-badge">Wisdom from Seniors</span>
      <h2 class="section-title">Senior <span class="highlight">Advice Wall</span></h2>
      <p class="section-description">Words of wisdom from those who walked these halls before you</p>
    </div>

    <!-- Submit Form -->
    <div class="advice-form-container">
      <h3 class="advice-form-title">💡 Share Your Wisdom</h3>
      <p class="advice-form-subtitle">Leave advice for the juniors who will follow in your footsteps</p>
      
      <form class="advice-form" id="adviceForm" onsubmit="submitAdvice(event)">
        <div class="advice-form-row">
          <input 
            type="text" 
            class="advice-input" 
            id="adviceName" 
            placeholder="Your Name"

            required
          />

        <div>
          <textarea

      <div class="advice-stat">

    <!-- Category Filters -->

      <button class="advice-filter-btn" data-category="friends">👥 Friends</button>

      <button class="advice-filter-btn" data-category="exams">📝 Exams</button>

<script data-fragment-script="advicewall">
// ═══════════════════════════════════════════════════════════════════════════════
// SENIOR ADVICE WALL
// ═══════════════════════════════════════════════════════════════════════════════

(function() {
  let adviceList = [];
  let currentFilter = 'all';
  let displayedCount = 0;
  const ITEMS_PER_PAGE = 12;

  // Category config
  const CATEGORIES = {
    general: { label: 'General', emoji: '💬' },
    academics: { label: 'Academics', emoji: '📚' },
    friends: { label: 'Friends', emoji: '👥' },
    teachers: { label: 'Teachers', emoji: '👨‍🏫' },
    exams: { label: 'Exams', emoji: '📝' },
    life: { label: 'Life', emoji: '🌟' },
    fun: { label: 'Fun', emoji: '🎉' },
    regrets: { label: 'Regrets', emoji: '💭' }
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // LOAD ADVICE
  // ═══════════════════════════════════════════════════════════════════════════
  async function loadAdvice() {
    const grid = document.getElementById('adviceGrid');
    if (!grid) return;

    grid.innerHTML = `
      <div class="advice-loading" style="grid-column: 1 / -1;">
        <div class="advice-spinner"></div>
        <p style="color: var(--text-muted);">Loading advice...</p>
      </div>
    `;

    try {
      const res = await fetch(apiUrl('/api/fun/advice'));
      const data = await res.json();

      if (data.success && Array.isArray(data.entries)) {
        adviceList = data.entries.sort((a, b) => {
          // Featured first, then by likes, then by date
          if (a.featured !== b.featured) return (b.featured ? 1 : 0) - (a.featured ? 1 : 0);
          if ((b.likes || 0) !== (a.likes || 0)) return (b.likes || 0) - (a.likes || 0);
          return new Date(b.createdAt) - new Date(a.createdAt);
        });
        
        displayedCount = 0;
        renderAdvice();
        updateStats();
      } else {
        showEmptyState();
      }
    } catch (e) {
      console.error('Failed to load advice:', e);
      showEmptyState('Failed to load advice. Please try again later.');
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER ADVICE
  // ═══════════════════════════════════════════════════════════════════════════
  function renderAdvice() {
    const grid = document.getElementById('adviceGrid');
    if (!grid) return;

    // Filter by category
    let filtered = currentFilter === 'all' 
      ? adviceList 
      : adviceList.filter(a => a.category === currentFilter);

    if (filtered.length === 0) {
      showEmptyState(currentFilter === 'all' 
        ? 'No advice yet. Be the first to share!' 
        : 'No advice in this category yet.');
      return;
    }

    // Get items to display
    const toShow = filtered.slice(0, displayedCount + ITEMS_PER_PAGE);
    displayedCount = toShow.length;

    grid.innerHTML = toShow.map(advice => renderAdviceCard(advice)).join('');

    // Show/hide load more button
    const loadMoreBtn = document.getElementById('adviceLoadMore');
    if (loadMoreBtn) {
      loadMoreBtn.style.display = displayedCount < filtered.length ? 'flex' : 'none';
    }
  }

  function renderAdviceCard(advice) {
    const initials = getInitials(advice.name || 'Anonymous');
    const category = CATEGORIES[advice.category] || CATEGORIES.general;
    const timeAgoStr = typeof timeAgo === 'function' ? timeAgo(advice.createdAt) : '';
    const isLiked = hasLikedAdvice(advice.id);

    return `
      <div class="advice-card ${advice.featured ? 'featured' : ''}" data-id="${advice.id}">
        ${advice.featured ? '<div class="advice-featured-badge">⭐ Featured</div>' : ''}
        
        <div class="advice-card-header">
          <div class="advice-avatar">${initials}</div>
          <div class="advice-author-info">
            <div class="advice-author-name">${escapeHtml(advice.name || 'Anonymous')}</div>
            <div class="advice-author-meta">
              ${advice.batch ? `<span class="advice-batch">Class of ${escapeHtml(advice.batch)}</span>` : ''}
              <span class="advice-category-badge">${category.emoji} ${category.label}</span>
            </div>
          </div>
        </div>
        
        <div class="advice-card-content">
          <div class="advice-quote-icon">❝</div>
          <p class="advice-text">${escapeHtml(advice.text)}</p>
        </div>
        
        <div class="advice-card-footer">
          <span class="advice-time">${timeAgoStr}</span>
          <div class="advice-actions">
            <button class="advice-action-btn ${isLiked ? 'liked' : ''}" onclick="toggleAdviceLike(${advice.id})">
              <span>${isLiked ? '❤️' : '🤍'}</span>
              <span>${advice.likes || 0}</span>
            </button>
            <button class="advice-action-btn" onclick="shareAdvice(${advice.id})">
              <span>📤</span>
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function showEmptyState(message = 'No advice yet. Be the first to share!') {
    const grid = document.getElementById('adviceGrid');
    if (!grid) return;

    grid.innerHTML = `
      <div class="advice-empty" style="grid-column: 1 / -1;">
        <div class="advice-empty-icon">💡</div>
        <h3 class="advice-empty-title">Share Your Wisdom</h3>
        <p class="advice-empty-text">${escapeHtml(message)}</p>
      </div>
    `;

    const loadMoreBtn = document.getElementById('adviceLoadMore');
    if (loadMoreBtn) loadMoreBtn.style.display = 'none';
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // UPDATE STATS
  // ═══════════════════════════════════════════════════════════════════════════
  function updateStats() {
    const totalEl = document.getElementById('adviceTotalCount');
    const seniorsEl = document.getElementById('adviceSeniorsCount');
    const likesEl = document.getElementById('adviceLikesCount');

    if (totalEl) totalEl.textContent = adviceList.length;
    
    if (seniorsEl) {
      const uniqueSeniors = new Set(adviceList.map(a => (a.name || '').toLowerCase().trim())).size;
      seniorsEl.textContent = uniqueSeniors;
    }
    
    if (likesEl) {
      const totalLikes = adviceList.reduce((sum, a) => sum + (a.likes || 0), 0);
      likesEl.textContent = totalLikes;
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // SUBMIT ADVICE
  // ═══════════════════════════════════════════════════════════════════════════
  window.submitAdvice = async function(e) {
    e.preventDefault();

    const name = document.getElementById('adviceName')?.value?.trim();
    const batch = document.getElementById('adviceBatch')?.value?.trim();
    const category = document.getElementById('adviceCategory')?.value || 'general';
    const text = document.getElementById('adviceText')?.value?.trim();
    const submitBtn = document.getElementById('adviceSubmitBtn');

    if (!name || !text) {
      showNotification('error', 'Missing Fields', 'Please enter your name and advice.');
      return;
    }

    if (text.length < 10) {
      showNotification('error', 'Too Short', 'Please write at least 10 characters of advice.');
      return;
    }

    if (submitBtn) submitBtn.disabled = true;

    try {
      const res = await fetch(apiUrl('/api/fun/advice'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, batch, category, text })
      });

      const data = await res.json();

      if (data.success) {
        showNotification('success', 'Advice Shared!', 'Thank you for sharing your wisdom! 💡');
        
        // Reset form
        document.getElementById('adviceForm')?.reset();
        updateAdviceCharCount();
        
        // Reload advice
        await loadAdvice();
        
        // Trigger confetti
        if (typeof triggerConfetti === 'function') triggerConfetti();
      } else {
        showNotification('error', 'Failed', data.error || 'Could not submit advice.');
      }
    } catch (e) {
      console.error('Submit advice error:', e);
      showNotification('error', 'Error', 'Failed to submit. Please try again.');
    } finally {
      if (submitBtn) submitBtn.disabled = false;
    }
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // LIKE ADVICE
  // ═══════════════════════════════════════════════════════════════════════════
  function hasLikedAdvice(id) {
    const liked = JSON.parse(localStorage.getItem('adviceLiked') || '[]');
    return liked.includes(id);
  }

  function setAdviceLiked(id, liked) {
    let likedList = JSON.parse(localStorage.getItem('adviceLiked') || '[]');
    if (liked && !likedList.includes(id)) {
      likedList.push(id);
    } else if (!liked) {
      likedList = likedList.filter(x => x !== id);
    }
    localStorage.setItem('adviceLiked', JSON.stringify(likedList));
  }

  window.toggleAdviceLike = async function(id) {
    const isLiked = hasLikedAdvice(id);
    
    try {
      const res = await fetch(apiUrl(`/api/fun/advice/${id}/like`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ unlike: isLiked })
      });

      const data = await res.json();

      if (data.success) {
        setAdviceLiked(id, !isLiked);
        
        // Update in local list
        const advice = adviceList.find(a => a.id === id);
        if (advice) {
          advice.likes = data.likes ?? (isLiked ? (advice.likes || 1) - 1 : (advice.likes || 0) + 1);
        }
        
        renderAdvice();
        updateStats();
      }
    } catch (e) {
      console.error('Like error:', e);
    }
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // SHARE ADVICE
  // ═══════════════════════════════════════════════════════════════════════════
  window.shareAdvice = function(id) {
 if (!adviceList || !Array.isArray(adviceList)) {
 showNotification('error', 'Error', 'Advice data not loaded yet.');
 return;
 }
 const advice = adviceList.find(a => a.id === id);
 if (!advice) {
 showNotification('error', 'Not Found', 'Could not find this advice.');
 return;
 }
 const text = ` Senior Advice from ${advice.name || 'Anonymous'}:\n\n"${advice.text}"\n\n— Class of ${advice.batch || '2025'}`;
 if (navigator.share) {
 navigator.share({
 title: 'Senior Advice',
 text: text
 }).catch(() => {});
 } else if (navigator.clipboard && navigator.clipboard.writeText) {
 // Fallback: copy to clipboard
 navigator.clipboard.writeText(text).then(() => {
 showNotification('success', 'Copied!', 'Advice copied to clipboard.');
 }).catch(() => {
 showNotification('error', 'Failed', 'Could not copy to clipboard.');
 });
 } else {
 // Final fallback for older browsers
 const textarea = document.createElement('textarea');
 textarea.value = text;
 textarea.style.position = 'fixed';
 textarea.style.opacity = '0';
 document.body.appendChild(textarea);
 textarea.select();
 try {
 document.execCommand('copy');
 showNotification('success', 'Copied!', 'Advice copied to clipboard.');
 } catch (e) {
 showNotification('error', 'Failed', 'Could not copy to clipboard.');
 }
 document.body.removeChild(textarea);
 }
 };

  // ═══════════════════════════════════════════════════════════════════════════
  // FILTER
  // ═══════════════════════════════════════════════════════════════════════════
  function setupFilters() {
    const filterContainer = document.getElementById('adviceFilters');
    if (!filterContainer) return;

    filterContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('.advice-filter-btn');
      if (!btn) return;

      // Update active state
      filterContainer.querySelectorAll('.advice-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Set filter and re-render
      currentFilter = btn.dataset.category || 'all';
      displayedCount = 0;
      renderAdvice();
    });
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // LOAD MORE
  // ═══════════════════════════════════════════════════════════════════════════
  window.loadMoreAdvice = function() {
    renderAdvice();
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // CHARACTER COUNT
  // ═══════════════════════════════════════════════════════════════════════════
  window.updateAdviceCharCount = function() {
    const textarea = document.getElementById('adviceText');
    const counter = document.getElementById('adviceCharCount');
    if (!textarea || !counter) return;

    const len = textarea.value.length;
    const max = 500;
    counter.textContent = `${len} / ${max}`;
    counter.classList.toggle('warning', len > max * 0.9);
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // INITIALIZE
  // ═══════════════════════════════════════════════════════════════════════════
  function initAdviceWall() {
    setupFilters();
    loadAdvice();
  }

  // Initialize on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAdviceWall);
  } else {
    setTimeout(initAdviceWall, 100);
  }

  // Expose functions
  window.loadAdvice = loadAdvice;
  window.initAdviceWall = initAdviceWall;
})();
</script>
