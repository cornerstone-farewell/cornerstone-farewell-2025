<!-- FRAGMENT: memories -->
<style data-fragment-style="memories">
#memories { background: linear-gradient(180deg, var(--navy-medium) 0%, var(--navy-dark) 100%); }
.memory-filters { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 25px; }

.memory-card {

<script data-fragment-script="memories">
(function() {
  'use strict';
  
  // ═══════════════════════════════════════════════════════════════════════════════
  // MEMORIES MODULE STATE
  // ═══════════════════════════════════════════════════════════════════════════════
  const mem = {
    memories: [],
    allMemories: [],
    currentFilter: 'all',
    allFilter: 'all',
    previewLimit: 6,
    loading: false,
    lightboxIndex: 0,
    lightboxSource: 'preview', // 'preview' or 'all'
    activeMemoryId: null,
    replyingTo: null
  };

  // ═══════════════════════════════════════════════════════════════════════════════
  // INITIALIZATION
  // ═══════════════════════════════════════════════════════════════════════════════
  function init() {
    console.log('[Memories] Initializing...');
    
    // Main page filter buttons
    document.querySelectorAll('#memoryFilters .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#memoryFilters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mem.currentFilter = btn.dataset.filter;
        loadPreviewMemories();
      });
    });

    // View All button
    const viewAllBtn = document.getElementById('viewAllMemoriesBtn');
    if (viewAllBtn) {
      viewAllBtn.addEventListener('click', openAllMemoriesOverlay);
      console.log('[Memories] View All button bound');
    }

    // Close overlay button
    const closeBtn = document.getElementById('closeAllMemoriesBtn');
    if (closeBtn) {
      closeBtn.addEventListener('click', closeAllMemoriesOverlay);
    }

    // Lightbox buttons
    const closeLB = document.getElementById('closeLightboxBtn');
    if (closeLB) closeLB.addEventListener('click', closeLightbox);
    
    const prevLB = document.getElementById('lightboxPrevBtn');
    if (prevLB) prevLB.addEventListener('click', () => navigateLightbox(-1));
    
    const nextLB = document.getElementById('lightboxNextBtn');
    if (nextLB) nextLB.addEventListener('click', () => navigateLightbox(1));

    // Comment buttons
    const postBtn = document.getElementById('postCommentBtn');
    if (postBtn) postBtn.addEventListener('click', postComment);
    
    const cancelBtn = document.getElementById('cancelReplyBtn');
    if (cancelBtn) cancelBtn.addEventListener('click', () => {
      mem.replyingTo = null;
      updateReplyUI();
    });

    // Keyboard
    document.addEventListener('keydown', handleKeyboard);

    // Load initial memories
    loadPreviewMemories();
    
    console.log('[Memories] Initialized successfully');
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // LOAD PREVIEW MEMORIES (Main Page - First 6)
  // ═══════════════════════════════════════════════════════════════════════════════
  async function loadPreviewMemories() {
    const grid = document.getElementById('memoryGrid');
    const countPill = document.getElementById('memCountPill');
    
    if (grid) {
      grid.innerHTML = `<div class="memory-loading" style="grid-column: 1/-1;">
        <div class="loading-spinner"></div>
        <p>Loading memories...</p>
      </div>`;
    }

    try {
      const params = new URLSearchParams({ page: '1', limit: '100' });
      if (mem.currentFilter !== 'all') params.set('type', mem.currentFilter);
      
      const res = await fetch(apiUrl(`/api/memories?${params}`));
      const data = await res.json();

      if (data.success) {
        mem.memories = (data.memories || []).map(m => ({
          ...m,
          file_url: mediaUrl(m.file_url)
        }));
        
        if (countPill) countPill.textContent = `${mem.memories.length} memories`;
        renderPreviewGrid();
      }
    } catch (e) {
      console.error('[Memories] Load error:', e);
      if (grid) {
        grid.innerHTML = `<div class="memory-empty" style="grid-column: 1/-1;">
          <div class="memory-empty-icon">❌</div>
          <h3>Error Loading</h3>
          <p>${escapeHtml(e.message)}</p>
        </div>`;
      }
    }
  }

  function renderPreviewGrid() {
    const grid = document.getElementById('memoryGrid');
    if (!grid) return;

    const display = mem.memories.slice(0, mem.previewLimit);
    
    if (display.length === 0) {
      grid.innerHTML = `<div class="memory-empty" style="grid-column: 1/-1;">
        <div class="memory-empty-icon">🖼️</div>
        <h3>No Memories Yet</h3>
        <p>Be the first to share!</p>
      </div>`;
      return;
    }

    grid.innerHTML = display.map((m, i) => renderCard(m, i, 'preview')).join('');
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // ALL MEMORIES OVERLAY
  // ═══════════════════════════════════════════════════════════════════════════════
  function openAllMemoriesOverlay() {
    console.log('[Memories] Opening All Memories overlay');
    
    const overlay = document.getElementById('allMemoriesOverlay');
    if (!overlay) {
      console.error('[Memories] Overlay element not found!');
      return;
    }
    
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    mem.allFilter = 'all';
    mem.allMemories = [];
    
    setupOverlayFilters();
    loadAllMemories();
  }

  function closeAllMemoriesOverlay() {
    console.log('[Memories] Closing overlay');
    const overlay = document.getElementById('allMemoriesOverlay');
    if (overlay) overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  function setupOverlayFilters() {
    const container = document.getElementById('allMemoriesFilters');
    if (!container) return;

    const filters = ['all', 'Friends', 'Teachers', 'Events', 'Fun Moments', 'Sports', 'Academics', 'Other'];
    
    container.innerHTML = filters.map(f => `
      <button class="filter-btn ${f === mem.allFilter ? 'active' : ''}" data-filter="${f}">
        ${f === 'all' ? 'All' : f}
      </button>
    `).join('');

    container.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mem.allFilter = btn.dataset.filter;
        loadAllMemories();
      });
    });
  }

  async function loadAllMemories() {
    const grid = document.getElementById('allMemoriesGrid');
    const countEl = document.getElementById('allMemoriesCount');
    
    if (grid) {
      grid.innerHTML = `<div class="all-memories-loading">
        <div class="loading-spinner"></div>
        <p>Loading all memories...</p>
      </div>`;
    }
    if (countEl) countEl.textContent = 'Loading...';

    mem.allMemories = [];
    let page = 1;
    let hasMore = true;

    try {
      while (hasMore) {
        const params = new URLSearchParams({ page: String(page), limit: '100' });
        if (mem.allFilter !== 'all') params.set('type', mem.allFilter);

        const res = await fetch(apiUrl(`/api/memories?${params}`));
        const data = await res.json();

        if (data.success && data.memories && data.memories.length > 0) {
          const newItems = data.memories.map(m => ({
            ...m,
            file_url: mediaUrl(m.file_url)
          }));
          
          mem.allMemories = mem.allMemories.concat(newItems);
          hasMore = data.hasMore !== false && newItems.length === 100;
          page++;
          
          // Update count as we load
          if (countEl) countEl.textContent = `${mem.allMemories.length} memories`;
          
          // Progressive render
          renderAllMemoriesGrid();
        } else {
          hasMore = false;
        }
      }

      if (countEl) countEl.textContent = `${mem.allMemories.length} memories`;
      renderAllMemoriesGrid();
      
      console.log(`[Memories] Loaded ${mem.allMemories.length} total memories`);
      
    } catch (e) {
      console.error('[Memories] Load all error:', e);
      if (grid) {
        grid.innerHTML = `<div class="all-memories-loading">
          <div class="memory-empty-icon">❌</div>
          <h3>Error Loading</h3>
          <p>${escapeHtml(e.message)}</p>
        </div>`;
      }
    }
  }

  function renderAllMemoriesGrid() {
    const grid = document.getElementById('allMemoriesGrid');
    if (!grid) return;

    if (mem.allMemories.length === 0) {
      grid.innerHTML = `<div class="all-memories-loading">
        <div class="memory-empty-icon">📷</div>
        <h3>No Memories Found</h3>
        <p>No memories match this filter.</p>
      </div>`;
      return;
    }

    grid.innerHTML = mem.allMemories.map((m, i) => renderCard(m, i, 'all')).join('');
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // RENDER MEMORY CARD
  // ═══════════════════════════════════════════════════════════════════════════════
  function renderCard(memory, index, source) {
    const liked = isLiked(memory.id);
    const rx = memory.reactions || {};
    
    return `
      <div class="memory-card">
        <div class="memory-media" onclick="window._memOpenLightbox('${source}', ${index})">
          ${memory.file_type === 'video'
            ? `<video src="${memory.file_url}" preload="metadata"></video><div class="play-button">▶</div>`
            : `<img src="${memory.file_url}" alt="${escapeAttr(memory.caption)}" loading="lazy" />`}
          <span class="memory-type-badge">${escapeHtml(memory.memory_type || 'Memory')}</span>
          ${memory.featured ? `<span class="memory-featured-badge">⭐ Featured</span>` : ''}
        </div>
        <div class="memory-content">
          <div class="memory-author">
            <div class="memory-avatar">${escapeHtml((memory.student_name || 'A').charAt(0).toUpperCase())}</div>
            <div class="memory-author-info">
              <div class="memory-author-name">${escapeHtml(memory.student_name || 'Anonymous')}</div>
              <div class="memory-time">${timeAgo(memory.created_at)}</div>
            </div>
          </div>
          <p class="memory-caption">${escapeHtml(memory.caption || '')}</p>
          <div class="memory-actions">
            <div class="action-row">
              <button class="like-btn ${liked ? 'liked' : ''}" onclick="window._memLike(${memory.id}, this)">
                <span class="heart-icon">${liked ? '❤️' : '🤍'}</span>
                <span class="like-count">${memory.likes || 0}</span>
              </button>
              <button class="comments-open-btn" onclick="window._memOpenLightbox('${source}', ${index})">
                💬 Comments
              </button>
            </div>
            <div class="react-group">
              <button class="react-btn" onclick="window._memReact(${memory.id}, 'like')">👍 <span class="react-count">${rx.like || 0}</span></button>
              <button class="react-btn" onclick="window._memReact(${memory.id}, 'love')">😍 <span class="react-count">${rx.love || 0}</span></button>
              <button class="react-btn" onclick="window._memReact(${memory.id}, 'laugh')">😂 <span class="react-count">${rx.laugh || 0}</span></button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // LIKES & REACTIONS
  // ═══════════════════════════════════════════════════════════════════════════════
  function isLiked(id) {
    const liked = JSON.parse(localStorage.getItem('likedMemories') || '[]');
    return liked.includes(id);
  }

  async function likeMemory(id, btn) {
    if (isLiked(id)) return;
    
    try {
      const res = await fetch(apiUrl(`/api/like/${id}`), { method: 'POST' });
      const data = await res.json();
      
      if (data.success) {
        const liked = JSON.parse(localStorage.getItem('likedMemories') || '[]');
        liked.push(id);
        localStorage.setItem('likedMemories', JSON.stringify(liked));
        
        if (btn) {
          btn.classList.add('liked');
          btn.querySelector('.heart-icon').textContent = '❤️';
          btn.querySelector('.like-count').textContent = data.likes;
        }
        
        // Update in arrays
        [mem.memories, mem.allMemories].forEach(arr => {
          const m = arr.find(x => x.id === id);
          if (m) m.likes = data.likes;
        });
      }
    } catch (e) {
      console.error('[Memories] Like error:', e);
    }
  }

  async function react(id, type) {
    try {
      const res = await fetch(apiUrl(`/api/reactions/${id}`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type })
      });
      const data = await res.json();
      
      if (data.success) {
        [mem.memories, mem.allMemories].forEach(arr => {
          const m = arr.find(x => x.id === id);
          if (m) m.reactions = data.reactions;
        });
        
        // Re-render both grids
        renderPreviewGrid();
        if (document.getElementById('allMemoriesOverlay')?.classList.contains('active')) {
          renderAllMemoriesGrid();
        }
      }
    } catch (e) {
      console.error('[Memories] React error:', e);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // LIGHTBOX
  // ═══════════════════════════════════════════════════════════════════════════════
  function openLightbox(source, index) {
    console.log(`[Memories] Opening lightbox: ${source}[${index}]`);
    
    mem.lightboxSource = source;
    mem.lightboxIndex = index;
    mem.replyingTo = null;
    
    const memories = source === 'all' ? mem.allMemories : mem.memories;
    mem.activeMemoryId = memories[index]?.id;
    
    updateLightbox();
    
    const lightbox = document.getElementById('lightbox');
    if (lightbox) lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    const lightbox = document.getElementById('lightbox');
    if (lightbox) lightbox.classList.remove('active');
    
    // Restore scroll only if overlay isn't open
    const overlay = document.getElementById('allMemoriesOverlay');
    if (!overlay?.classList.contains('active')) {
      document.body.style.overflow = '';
    }
    
    const video = document.querySelector('#lightboxContent video');
    if (video) video.pause();
    
    mem.activeMemoryId = null;
  }

  function navigateLightbox(dir) {
    const memories = mem.lightboxSource === 'all' ? mem.allMemories : mem.memories;
    
    mem.lightboxIndex += dir;
    if (mem.lightboxIndex < 0) mem.lightboxIndex = memories.length - 1;
    if (mem.lightboxIndex >= memories.length) mem.lightboxIndex = 0;
    
    mem.replyingTo = null;
    mem.activeMemoryId = memories[mem.lightboxIndex]?.id;
    updateLightbox();
  }

  async function updateLightbox() {
    const memories = mem.lightboxSource === 'all' ? mem.allMemories : mem.memories;
    const memory = memories[mem.lightboxIndex];
    if (!memory) return;

    const content = document.getElementById('lightboxContent');
    const info = document.getElementById('lightboxInfo');

    if (content) {
      content.innerHTML = memory.file_type === 'video'
        ? `<video src="${memory.file_url}" controls autoplay></video>`
        : `<img src="${memory.file_url}" alt="${escapeAttr(memory.caption || '')}" />`;
    }

    if (info) {
      info.innerHTML = `
        <div class="lightbox-author">${escapeHtml(memory.student_name || 'Anonymous')}</div>
        <div class="lightbox-caption">${escapeHtml(memory.caption || '')}</div>
        <div class="lightbox-meta">
          <span>${escapeHtml(memory.memory_type || 'Memory')}</span>
          <span>•</span>
          <span>${timeAgo(memory.created_at)}</span>
          ${memory.featured ? `<span class="mini-pill" style="color:var(--primary-gold);">⭐ Featured</span>` : ''}
        </div>
        <a href="${memory.file_url}" download class="lightbox-download">⬇️ Download</a>
      `;
    }

    await loadComments(memory.id);
    updateReplyUI();
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // COMMENTS
  // ═══════════════════════════════════════════════════════════════════════════════
  async function loadComments(memoryId) {
    if (!memoryId) return;

    try {
      const res = await fetch(apiUrl(`/api/comments/${memoryId}`));
      const data = await res.json();
      
      if (!data.success) return;

      const disabled = !!data.disabled;
      const banner = document.getElementById('commentsDisabledBanner');
      const form = document.getElementById('commentForm');
      if (banner) banner.style.display = disabled ? 'block' : 'none';
      if (form) form.style.display = disabled ? 'none' : 'grid';

      const comments = data.comments || [];
      const count = countComments(comments);
      
      const countPill = document.getElementById('commentsCountPill');
      if (countPill) countPill.textContent = count;

      renderComments(comments);
    } catch (e) {
      console.error('[Memories] Load comments error:', e);
    }
  }

  function countComments(tree) {
    let n = 0;
    for (const c of tree) {
      n++;
      if (c.replies?.length) n += countComments(c.replies);
    }
    return n;
  }

  function renderComments(tree) {
    const list = document.getElementById('commentList');
    if (!list) return;

    if (!tree.length) {
      list.innerHTML = `<div class="mini-pill">No comments yet. Be the first!</div>`;
      return;
    }

    list.innerHTML = tree.map(c => renderCommentNode(c)).join('');
  }

  function renderCommentNode(c) {
    return `
      <div class="comment-item" data-id="${c.id}">
        <div class="comment-top">
          <div class="comment-name">${escapeHtml(c.name || 'Anonymous')}</div>
          <div class="comment-time">${timeAgo(c.createdAt)}</div>
        </div>
        <div class="comment-text">${escapeHtml(c.text || '')}</div>
        <button class="comment-reply-btn" onclick="window._memStartReply(${c.id})">Reply</button>
        ${c.replies?.length ? `<div class="comment-replies">${c.replies.map(r => renderCommentNode(r)).join('')}</div>` : ''}
      </div>
    `;
  }

  function startReply(commentId) {
    mem.replyingTo = commentId;
    updateReplyUI();
    document.getElementById('commentText')?.focus();
  }

  function updateReplyUI() {
    const cancelBtn = document.getElementById('cancelReplyBtn');
    const replyPill = document.getElementById('replyingToPill');
    if (cancelBtn) cancelBtn.style.display = mem.replyingTo ? 'inline-flex' : 'none';
    if (replyPill) replyPill.style.display = mem.replyingTo ? 'inline-block' : 'none';
  }

  async function postComment() {
    const memoryId = mem.activeMemoryId;
    if (!memoryId) return;

    const name = document.getElementById('commentName')?.value?.trim();
    const text = document.getElementById('commentText')?.value?.trim();

    if (!name) {
      showNotification('error', 'Name Required', 'Please enter your name.');
      return;
    }
    if (!text) {
      showNotification('error', 'Comment Required', 'Please write a comment.');
      return;
    }

    try {
      const res = await fetch(apiUrl(`/api/comments/${memoryId}`), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, text, parentId: mem.replyingTo })
      });
      const data = await res.json();

      if (!data.success) {
        showNotification('error', 'Failed', data.error || 'Could not post comment.');
        return;
      }

      document.getElementById('commentText').value = '';
      mem.replyingTo = null;
      updateReplyUI();
      await loadComments(memoryId);
      showNotification('success', 'Posted', 'Your comment was added!');
    } catch (e) {
      showNotification('error', 'Error', e.message);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // KEYBOARD HANDLER
  // ═══════════════════════════════════════════════════════════════════════════════
  function handleKeyboard(e) {
    if (e.key === 'Escape') {
      const lightbox = document.getElementById('lightbox');
      if (lightbox?.classList.contains('active')) {
        closeLightbox();
        return;
      }
      const overlay = document.getElementById('allMemoriesOverlay');
      if (overlay?.classList.contains('active')) {
        closeAllMemoriesOverlay();
        return;
      }
    }

    const lightbox = document.getElementById('lightbox');
    if (lightbox?.classList.contains('active')) {
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════════
  // EXPOSE GLOBAL FUNCTIONS
  // ═══════════════════════════════════════════════════════════════════════════════
  window._memOpenLightbox = openLightbox;
  window._memLike = likeMemory;
  window._memReact = react;
  window._memStartReply = startReply;
  
  // Also expose with standard names for compatibility
  window.openLightbox = (i) => openLightbox('preview', i);
  window.closeLightbox = closeLightbox;
  window.loadMemories = loadPreviewMemories;

  // ═══════════════════════════════════════════════════════════════════════════════
  // INIT ON DOM READY
  // ═══════════════════════════════════════════════════════════════════════════════
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
