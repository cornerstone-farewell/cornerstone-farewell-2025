<!-- FRAGMENT: superlatives -->
<style data-fragment-style="superlatives">
#superlativesSection{background:var(--navy-medium)}
.superlative-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px 20px;transition:transform .3s,border-color .3s,box-shadow .3s}
.superlative-card:hover{transform:translateY(-6px);border-color:var(--primary-gold);box-shadow:0 0 20px rgba(212,175,55,.25),0 0 60px rgba(212,175,55,.1),inset 0 0 20px rgba(212,175,55,.05)}
.superlative-emoji{font-size:2.4rem;margin-bottom:10px;display:block}
.superlative-title{font-family:var(--font-display);font-size:1.15rem;color:var(--primary-gold);margin-bottom:12px}
.superlative-nominee-list{display:grid;gap:10px}
.nominee-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:background .2s}
.nominee-row:hover{background:rgba(212,175,55,.12);border-color:rgba(212,175,55,.25)}
.nominee-main{display:flex;align-items:center;gap:10px;min-width:0}
.nominee-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);flex-shrink:0}
.nominee-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.nominee-avatar.fallback{display:flex;align-items:center;justify-content:center;color:var(--primary-gold);font-weight:700}
.nominee-name{font-size:.9rem;font-weight:600}
.nominee-votes{font-size:.82rem;color:var(--primary-gold);min-width:40px;text-align:right}
.nominee-bar{height:4px;border-radius:2px;background:var(--primary-gold);margin-top:4px;transition:width .5s ease}
.superlative-add-form{margin-top:14px;display:grid;gap:10px}
.superlative-select{width:100%;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#fff}
.superlative-select option{background:var(--navy-dark);color:#fff}
.superlative-empty{color:var(--text-muted);font-size:.9rem}
/* Section Tabs */
.sup-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:30px;flex-wrap:wrap;}
.sup-tab{padding:8px 20px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text-light);cursor:pointer;transition:all 0.3s;}
.sup-tab:hover{background:rgba(212,175,55,0.1);border-color:var(--primary-gold);}
.sup-tab.active{background:var(--primary-gold);color:var(--navy-dark);font-weight:bold;border-color:var(--primary-gold);}
</style>

<section class="ff-section-hidden" id="superlativesSection">
 <div class="container">
 <div class="section-header">
 <span class="section-badge">Class Awards</span>
 <h2 class="section-title">Class <span class="highlight">Superlatives</span></h2>
 <p class="section-description">Select your section below to nominate and vote for your classmates!</p>
 </div>
 
 <div class="sup-tabs" id="supSectionTabs">
 <!-- Tabs generated via JS -->
 </div>

 <div class="superlatives-grid" id="superlativesGrid"><div class="ff-empty">Loading...</div></div>
 </div>
</section>

<script data-fragment-script="superlatives">
(function() {
 let superlativesStudentDirectory = [];
 let supCategories = [];
 let activeSection = 'All';

  async function initSuperlatives() {
 const grid = document.getElementById('superlativesGrid');
 try {
 // Load superlatives
 let supData = { categories: [] };
 try {
 const supRes = await fetch(apiUrl('/api/fun/superlatives'));
 if (supRes.ok) {
 supData = await supRes.json();
 }
 } catch (e) {
 console.warn('[Superlatives] Could not load categories:', e);
 }
 supCategories = supData?.categories || [];
 // Load student directory separately (don't fail if this fails)
 try {
 const studentRes = await fetch(apiUrl('/api/student-directory'));
 if (studentRes.ok) {
 const studentData = await studentRes.json();
 superlativesStudentDirectory = (studentData?.students || []).map(s => ({
 name: String(s.name || '').trim(),
 section: String(s.section || '').trim(),
 photo: String(s.photo || '').trim()
 }));
 }
 } catch (e) {
 console.warn('[Superlatives] Could not load student directory:', e);
 superlativesStudentDirectory = [];
 }
 renderTabs();
 renderSuperlatives();
 } catch (e) {
 console.error('[Superlatives] Init error:', e);
 if (grid) grid.innerHTML = `<div class="ff-empty">Failed to load superlatives. Please refresh the page.</div>`;
 }
 }
 function getSections() {
 const sections = new Set(superlativesStudentDirectory.map(s => s.section).filter(Boolean));
 return ['All', ...Array.from(sections).sort()];
 }

 function renderTabs() {
 const tabsContainer = document.getElementById('supSectionTabs');
 if (!tabsContainer) return;
 const sections = getSections();
 tabsContainer.innerHTML = sections.map(sec => `
 <button class="sup-tab ${sec === activeSection ? 'active' : ''}" onclick="window.setSupSection('${escapeAttr(sec)}')">${escapeHtml(sec)}</button>
 `).join('');
 }

 window.setSupSection = function(section) {
 activeSection = section;
 renderTabs();
 renderSuperlatives();
 };

 function getStudentByName(name) {
 const key = String(name || '').trim().toLowerCase();
 return superlativesStudentDirectory.find(s => s.name.toLowerCase() === key) || null;
 }

 function studentInitials(name) {
 const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
 if (!parts.length) return 'S';
 return parts.length === 1 ? parts[0].slice(0, 2).toUpperCase() : (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
 }

 function renderSuperlatives() {
 const grid = document.getElementById('superlativesGrid');
 if (!grid) return;
 if (!supCategories.length) {
 grid.innerHTML = `<div class="ff-empty">No superlative categories yet.</div>`;
 return;
 }

 const emojiMap = ['🤡','🌟','💼','✈️','😁','🎨','🏃','🌍'];
 
 grid.innerHTML = supCategories.map((cat, i) => {
 // Filter nominees by active section
 let sectionNominees = cat.nominees || [];
 if (activeSection !== 'All') {
 sectionNominees = sectionNominees.filter(n => {
 const st = getStudentByName(n.name);
 return st && st.section === activeSection;
 });
 }

 const maxVotes = Math.max(1, ...sectionNominees.map(n => Number(n.votes) || 0));
 
 const nomineesHtml = sectionNominees.map(n => {
 const votes = Number(n.votes) || 0;
 const width = Math.max(6, Math.round((votes / maxVotes) * 100));
 const student = getStudentByName(n.name);
 const avatar = student?.photo
 ? `<div class="nominee-avatar"><img src="${escapeAttr(student.photo.startsWith('/uploads/') ? mediaUrl(student.photo) : student.photo)}" alt="Avatar"></div>`
 : `<div class="nominee-avatar fallback">${escapeHtml(studentInitials(n.name))}</div>`;
 
 return `
 <div class="nominee-row" onclick="window.voteSuperlative(${cat.id}, '${escapeAttr(n.name)}')">
 <div style="flex:1; min-width:0;">
 <div class="nominee-main">
 ${avatar}
 <div style="min-width:0;">
 <div class="nominee-name">${escapeHtml(n.name)}</div>
 ${student?.section ? `<div style="font-size:.75rem; color:var(--text-muted);">${escapeHtml(student.section)}</div>` : ''}
 </div>
 </div>
 <div class="nominee-bar" style="width:${width}%"></div>
 </div>
 <div class="nominee-votes">${votes}</div>
 </div>`;
 }).join('');

 // Filter dropdown options by active section
 let availableStudents = superlativesStudentDirectory;
 if (activeSection !== 'All') {
 availableStudents = availableStudents.filter(s => s.section === activeSection);
 }
 const studentOptions = availableStudents
 .sort((a, b) => a.name.localeCompare(b.name))
 .map(s => `<option value="${escapeAttr(s.name)}">${escapeHtml(s.name)} ${s.section ? `(${s.section})` : ''}</option>`)
 .join('');

 return `
 <div class="superlative-card">
 <span class="superlative-emoji">${emojiMap[i % emojiMap.length]}</span>
 <div class="superlative-title">${escapeHtml(cat.title)}</div>
 <div class="superlative-nominee-list">
 ${nomineesHtml || `<div class="superlative-empty">No nominees in this section yet.</div>`}
 </div>
 <div class="superlative-add-form">
 <select class="superlative-select" id="superSelect_${cat.id}">
 <option value="">Select a classmate...</option>
 ${studentOptions}
 </select>
 <button class="ff-submit-btn" style="padding:10px; margin-top:0; width:100%; justify-content:center;" onclick="window.addSuperlativeNomineeFromSelect(${cat.id})"><span>+ Nominate</span></button>
 </div>
 </div>`;
 }).join('');
 }

 window.voteSuperlative = async function(categoryId, nomineeName) {
 try {
 const res = await fetch(apiUrl('/api/fun/superlatives/vote'), {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ categoryId, nomineeName })
 });
 const data = await res.json();
 if (data.success) {
 if(typeof showNotification==='function') showNotification('success', 'Vote counted', `You voted for ${nomineeName}`);
 initSuperlatives();
 }
 } catch (e) {}
 }

 window.addSuperlativeNomineeFromSelect = async function(categoryId) {
 const select = document.getElementById(`superSelect_${categoryId}`);
 const name = select?.value?.trim();
 if (!name) {
 if(typeof showNotification==='function') showNotification('error', 'Select Student', 'Please select a class member first.');
 return;
 }
 try {
 const res = await fetch(apiUrl('/api/fun/superlatives/nominee'), {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ categoryId, name })
 });
 const data = await res.json();
 if (data.success) {
 if(typeof showNotification==='function') showNotification('success', 'Nominated!', `${name} added to category.`);
 initSuperlatives();
 }
 } catch (e) {}
 }

 document.addEventListener('DOMContentLoaded', initSuperlatives);
})();
</script>
