// ── Teacher / Timeline row templates ────────────────────────────────────────

function teacherRowHtml(t = {}, idx = 0) {

      <button class="admin-btn admin-btn-danger" type="button" onclick="removeTeacherRow(${idx})">Remove</button>
    </div>
    <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label>Name</label>
        <input class="form-input" data-teacher-field="name" data-teacher-idx="${idx}" value="${escapeAttr(t.name || '')}" />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input class="form-input" data-teacher-field="subject" data-teacher-idx="${idx}" value="${escapeAttr(t.subject || '')}" />
      </div>
    </div>
    <div class="form-group" style="margin-top:10px;">
      <label>Quote</label>
      <textarea class="form-textarea" data-teacher-field="quote" data-teacher-idx="${idx}" maxlength="250">${escapeHtml(t.quote || '')}</textarea>
    </div>
    <div class="form-group" style="margin-top:10px;">
      <label>Image URL (optional)</label>
      <input class="form-input" data-teacher-field="imageUrl" data-teacher-idx="${idx}" value="${escapeAttr(t.imageUrl || '')}" placeholder="https://..." />
    </div>
  </div>`;
}

function timelineRowHtml(x = {}, idx = 0) {

      <div style="font-weight:800;">Item #${idx + 1}</div>

function renderTeachersEditor() {
  const wrap = document.getElementById('teachersEditor');
  if (!wrap) return;
  const arr = Array.isArray(state.settings.teachers) ? state.settings.teachers : [];
  wrap.innerHTML = arr.map((t, i) => teacherRowHtml(t, i)).join('') || `<div class="mini-pill">No teachers yet.</div>`;
}

function renderTimelineEditor() {
  const wrap = document.getElementById('timelineEditor');
  if (!wrap) return;
  const arr = Array.isArray(state.settings.timeline) ? state.settings.timeline : [];
  wrap.innerHTML = arr.map((x, i) => timelineRowHtml(x, i)).join('') || `<div class="mini-pill">No timeline items yet.</div>`;
}

function addTeacherRow() {
  if (!Array.isArray(state.settings.teachers)) state.settings.teachers = [];
  state.settings.teachers.push({ name: '', subject: '', quote: '', imageUrl: '' });
  renderTeachersEditor();
}

function removeTeacherRow(idx) {
  if (!Array.isArray(state.settings.teachers)) return;
  state.settings.teachers.splice(idx, 1);
  renderTeachersEditor();
}

function addTimelineRow() {
  if (!Array.isArray(state.settings.timeline)) state.settings.timeline = [];
  state.settings.timeline.push({ year: '', title: '', description: '' });
  renderTimelineEditor();
}

function removeTimelineRow(idx) {
  if (!Array.isArray(state.settings.timeline)) return;
  state.settings.timeline.splice(idx, 1);
  renderTimelineEditor();
}

function readTeachersFromEditor() {
  const inputs = Array.from(document.querySelectorAll('[data-teacher-idx]'));
  const arr = [];
  for (const el of inputs) {
    const idx = Number(el.dataset.teacherIdx);
    const field = el.dataset.teacherField;
    arr[idx] = arr[idx] || { name: '', subject: '', quote: '', imageUrl: '' };
    arr[idx][field] = el.value;
  }
  return (arr || []).filter(Boolean)
    .map(t => ({ name: String(t.name||'').trim(), subject: String(t.subject||'').trim(), quote: String(t.quote||'').trim(), imageUrl: String(t.imageUrl||'').trim() }))
    .filter(t => t.name);
}

function readTimelineFromEditor() {
  const inputs = Array.from(document.querySelectorAll('[data-timeline-idx]'));
  const arr = [];
  for (const el of inputs) {
    const idx = Number(el.dataset.timelineIdx);
    const field = el.dataset.timelineField;
    arr[idx] = arr[idx] || { year: '', title: '', description: '' };
    arr[idx][field] = el.value;
  }
  return (arr || []).filter(Boolean)
    .map(x => ({ year: String(x.year||'').trim(), title: String(x.title||'').trim(), description: String(x.description||'').trim() }))
    .filter(x => x.year || x.title || x.description);
}

// ── Student Directory ────────────────────────────────────────────────────────

async function loadStudentDirectoryIntoAdmin() {
  try {
    const res  = await fetch(apiUrl('/api/student-directory'));
    const data = await res.json();
    return data.success && Array.isArray(data.students) ? data.students : [];
  } catch (_) { return []; }
}

function buildStudentDirectoryCsvTemplate(students) {
  const rows = [['name','section']];
  (students || []).forEach(s => rows.push([s.name || '', s.section || '']));
  return rows.map(r => r.map(v => `"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
}

async function downloadStudentDirectoryTemplate() {
  const students = await loadStudentDirectoryIntoAdmin();
  const csv  = buildStudentDirectoryCsvTemplate(students);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'student-directory-template.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function uploadStudentDirectoryCsv(file) {
  if (!file) return showNotification('error', 'Missing file', 'Choose a CSV file first.');
  const text  = await file.text();
  const lines = text.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
  if (!lines.length) return showNotification('error', 'Empty file', 'CSV file is empty.');
  const rows = lines.slice(1).map(line => {
    const parts = line.split(',').map(x => x.trim().replace(/^"|"$/g, ''));
    return { name: parts[0] || '', section: parts[1] || '' };
  }).filter(r => r.name && r.section);
  const res  = await fetch(apiUrl('/api/admin/student-directory'), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.adminToken}` },
    body: JSON.stringify({ students: rows })
  });
  const data = await res.json();
  if (!data.success) return showNotification('error', 'Failed', data.error || 'Could not update student directory.');
  showNotification('success', 'Updated', `${rows.length} students imported.`);
  await reloadSettingsAdmin();
}

async function bulkApplyStudentsToSuperlatives() {
  const students = await loadStudentDirectoryIntoAdmin();
  if (!students.length) return showNotification('error', 'No students', 'Student directory is empty.');
  const categories = Array.isArray(window.supData) ? window.supData : [];
  categories.forEach(cat => {
    cat.nominees = students.map(s => ({ id: `${cat.id}_${s.name}`, name: s.name, votes: 0 }));
  });
  showNotification('success', 'Applied', 'Student directory has been copied into all superlative categories.');
  if (typeof renderSuperlatives === 'function') renderSuperlatives();
}

// ── Initialize Settings Panel Content ───────────────────────────────────────

function initSettingsPanelContent() {
  console.log('initSettingsPanelContent called');
  
  const panel = document.getElementById('panelSettings');
  if (!panel) {
    console.error('panelSettings element not found');
    return;
  }
  
  // Check if panel already has content (and it's not just whitespace)
  const hasContent = panel.innerHTML.trim().length > 100;
  
  if (!hasContent) {
    console.log('Rendering settings panel HTML...');
    panel.innerHTML = renderSettingsPanelHtml();
  }
  
  // Always sync the values after a short delay to ensure DOM is ready
  setTimeout(() => {
    console.log('Syncing settings editor...');
    renderTeachersEditor();
    renderTimelineEditor();
    syncSettingsEditor();
  }, 50);
}

function syncSettingsEditor() {
  const s = state.settings || {};
  
  console.log('syncSettingsEditor - settings:', s);
  
  setVal('setSchoolName',         s.schoolName || '');
  setVal('setEventName',          s.eventName || '');
  setVal('setLogoText',           s.logoText || '');
  setVal('setFarewellIST',        s.farewellIST || '');
  setVal('setContactEmail',       s.contactEmail || '');
  setVal('setLocationLine',       s.locationLine || '');
  setVal('setHeroBadge',          s.heroBadge || '');
  setVal('setHeroTitle',          s.heroTitle || '');
  setVal('setHeroSubtitle',       s.heroSubtitle || '');
  setVal('setHeroDescription',    s.heroDescription || '');
  setVal('setQuoteText',          s.quoteText || '');
  setVal('setQuoteAuthor',        s.quoteAuthor || '');
  setVal('setUploadsEnabled',     String(s.uploadsEnabled !== false));
  setVal('setCommentsEnabled',    String(s.commentsEnabled !== false));
  setVal('setProfanityEnabled',   String(!!s.profanityFilterEnabled));
  setVal('setUploadWindowEnabled',String(!!s.uploadWindowEnabled));
  setVal('setUploadWindowStart',  s.uploadWindowStartIST || '');
  setVal('setUploadWindowEnd',    s.uploadWindowEndIST || '');
  setVal('setAutoApproveEnabled', String(!!s.autoApproveEnabled));
  setVal('setAutoApproveStart',   s.autoApproveStartIST || '');
  setVal('setAutoApproveEnd',     s.autoApproveEndIST || '');
  setVal('setFooterDesc',         s.footerDesc || '');
  setVal('setFooterContactNote',  s.footerContactNote || '');
  setVal('setFooterMadeBy',       s.footerMadeBy || '');
  setVal('setFooterCopyright',    s.footerCopyright || '');
  setVal('setIntroHideSkip',      String(!!s.introHideSkip));
  
  const statusEl = document.getElementById('currentIntroVideoStatus');
  if (statusEl) statusEl.textContent = s.introVideoPath ? '✅ Video uploaded' : '❌ No video';
}

function readSettingsFromEditor() {
  const s = structuredClone(state.settings || {});
  s.schoolName           = getVal('setSchoolName');
  s.eventName            = getVal('setEventName');
  s.logoText             = getVal('setLogoText');
  s.farewellIST          = getVal('setFarewellIST');
  s.contactEmail         = getVal('setContactEmail');
  s.locationLine         = getVal('setLocationLine');
  s.heroBadge            = getVal('setHeroBadge');
  s.heroTitle            = getVal('setHeroTitle');
  s.heroSubtitle         = getVal('setHeroSubtitle');
  s.heroDescription      = getVal('setHeroDescription');
  s.quoteText            = getVal('setQuoteText');
  s.quoteAuthor          = getVal('setQuoteAuthor');
  s.uploadsEnabled       = getVal('setUploadsEnabled') === 'true';
  s.commentsEnabled      = getVal('setCommentsEnabled') === 'true';
  s.profanityFilterEnabled = getVal('setProfanityEnabled') === 'true';
  s.uploadWindowEnabled  = getVal('setUploadWindowEnabled') === 'true';
  s.uploadWindowStartIST = getVal('setUploadWindowStart');
  s.uploadWindowEndIST   = getVal('setUploadWindowEnd');
  s.autoApproveEnabled   = getVal('setAutoApproveEnabled') === 'true';
  s.autoApproveStartIST  = getVal('setAutoApproveStart');
  s.autoApproveEndIST    = getVal('setAutoApproveEnd');
  s.footerDesc           = getVal('setFooterDesc');
  s.footerContactNote    = getVal('setFooterContactNote');
  s.footerMadeBy         = getVal('setFooterMadeBy');
  s.footerCopyright      = getVal('setFooterCopyright');
  s.introHideSkip        = getVal('setIntroHideSkip') === 'true';
  return s;
}

async function saveSettingsFromEditor() {
  const btn = document.querySelector('[onclick="saveSettingsFromEditor()"]');
  if (btn) btn.disabled = true;
  
  try {
    const newSettings = readSettingsFromEditor();
    newSettings.teachers = readTeachersFromEditor();
    newSettings.timeline = readTimelineFromEditor();
    newSettings.theme = state.settings?.theme || {};
    
    console.log('Saving settings:', newSettings);
    
    const res = await fetch(apiUrl('/api/admin/settings'), {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json', 
        'Authorization': `Bearer ${state.adminToken}` 
      },
      body: JSON.stringify({ settings: newSettings })
    });
    
    const data = await res.json();
    
    if (data.success) {
      state.settings = mergeDeep(structuredClone(DEFAULT_SETTINGS), newSettings);
      applySettingsToUI();
      applyThemeToCSS();
      
      if (typeof updateUploadStatusCallout === 'function') updateUploadStatusCallout();
      if (typeof renderTeachers === 'function') renderTeachers();
      if (typeof renderTimeline === 'function') renderTimeline();
      
      showNotification('success', 'Saved!', 'Settings updated successfully.');
    } else {
      showNotification('error', 'Save failed', data.error || 'Unknown error');
    }
  } catch (e) {
    console.error('Save settings error:', e);
    showNotification('error', 'Save failed', e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function reloadSettingsAdmin() {
  showNotification('info', 'Loading...', 'Fetching settings from server.');
  
  try {
    await loadSettings();
    applySettingsToUI();
    applyThemeToCSS();
    
    renderTeachersEditor();
    renderTimelineEditor();
    syncSettingsEditor();
    
    if (typeof syncThemeEditor === 'function') syncThemeEditor();
    if (typeof renderTeachers === 'function') renderTeachers();
    if (typeof renderTimeline === 'function') renderTimeline();
    
    showNotification('success', 'Reloaded', 'Settings loaded from server.');
  } catch (e) {
    showNotification('error', 'Failed', e.message);
  }
}

// ── Intro video upload/remove ───────────────────────────────────────────────

function handleIntroVideoUpload() {
  const fileInput = document.getElementById('introVideoFileInput');
  if (fileInput && fileInput.files && fileInput.files[0]) {
    uploadIntroVideoFile(fileInput.files[0]);
  } else {
    showNotification('error', 'No file', 'Please select a video file first.');
  }
}

async function uploadIntroVideoFile(file) {
  if (!file) return;
  
  const status = document.getElementById('currentIntroVideoStatus');
  if (status) status.textContent = '⏳ Uploading...';
  
  const fd = new FormData();
  fd.append('video', file);
  
  try {
    const res = await fetch(apiUrl('/api/admin/upload-intro-video'), {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + state.adminToken },
      body: fd
    });
    
    const data = await res.json();
    
    if (data.success) {
      showNotification('success', 'Uploaded', 'Intro video saved.');
      if (status) status.textContent = '✅ Video uploaded';
      state.settings.introVideoPath = data.introVideoPath || data.path;
    } else {
      showNotification('error', 'Failed', data.error || 'Upload failed');
      if (status) status.textContent = '❌ Upload failed';
    }
  } catch (e) {
    console.error('Upload error:', e);
    showNotification('error', 'Error', e.message);
    if (status) status.textContent = '❌ Upload error';
  }
}

async function removeIntroVideo() {
  if (!confirm('Remove intro video? This cannot be undone.')) return;
  
  const status = document.getElementById('currentIntroVideoStatus');
  if (status) status.textContent = '⏳ Removing...';
  
  try {
    const res = await fetch(apiUrl('/api/admin/settings/intro-video'), {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + state.adminToken }
    });
    
    const data = await res.json();
    
    if (data.success) {
      showNotification('success', 'Removed', 'Intro video deleted.');
      if (status) status.textContent = '❌ No video';
      state.settings.introVideoPath = null;
    } else {
      showNotification('error', 'Failed', data.error);
      if (status) status.textContent = '❌ Remove failed';
    }
  } catch (e) {
    showNotification('error', 'Error', e.message);
    if (status) status.textContent = '❌ Error';
  }
}
