<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
<style data-fragment-style="admin_students">
/* Excel Table Preview Styling */
.excel-preview-wrapper {
 max-height: 400px;
 overflow-y: auto;
 background: rgba(0,0,0,0.3);
 border-radius: 12px;
 border: 1px solid rgba(255,255,255,0.15);
 margin-top: 15px;
 scrollbar-width: thin;
 scrollbar-color: var(--primary-gold) rgba(0,0,0,0.2);
}
.excel-preview-wrapper table {
 width: 100%;
 border-collapse: collapse;
 font-size: 0.85rem;
 text-align: left;
}
.excel-preview-wrapper th {
 position: sticky;
 top: 0;
 background: var(--navy-dark);
 padding: 12px 16px;
 color: var(--primary-gold);
 font-weight: 700;
 border-bottom: 2px solid rgba(212,175,55,0.3);
 z-index: 10;
 text-transform: capitalize;
}
.excel-preview-wrapper td {
 padding: 10px 16px;
 border-bottom: 1px solid rgba(255,255,255,0.05);
 color: var(--text-light);
}
.excel-preview-wrapper tr:hover td {
 background: rgba(212,175,55,0.1);
}
.bulk-instruction-list li { margin-left: 20px; margin-bottom: 5px; color: var(--text-muted); }
</style>

<script data-fragment-script="admin_students">
let studentDirectoryData = [];

function initStudentsPanelContent() {
 const panel = document.getElementById('panelStudents');
 if (!panel) return;
 if (panel.dataset.initialized !== 'true') {
 panel.innerHTML = renderStudentsPanelHtml();
 panel.dataset.initialized = 'true';
 }
 loadStudentDirectoryData();
}

function renderStudentsPanelHtml() {
 return `
 <div class="stat-card" style="text-align:left; margin-bottom:20px;">
 <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
 <h3 style="font-family:var(--font-display); color:var(--primary-gold); font-size:1.4rem;"> Student Directory</h3>
 <div style="display:flex; gap:10px;">
 <button class="admin-btn admin-btn-secondary" onclick="exportStudentDirectoryCsv()"> Export CSV</button>
 <button class="admin-btn admin-btn-primary" onclick="saveStudentDirectory()"> Save All Changes</button>
 </div>
 </div>
 <p style="color:var(--text-muted); margin-top:10px;">Manage class members. Used for mapping superlative images and standardizing names.</p>
 </div>

 <div class="ff-admin-card">
 <div class="ff-admin-card-header">
 <div class="ff-admin-card-title"> Bulk Import (CSV / Excel)</div>
 </div>
 <div class="callout" style="margin-bottom:14px;">
 <strong>Required Columns:</strong> <code>name</code>, <code>section</code> <br>
 <strong>Optional Columns:</strong> <code>photo</code>, <code>quote</code>, <code>destination</code>
 </div>
 <div style="display:flex; gap:15px; flex-wrap:wrap; align-items:flex-end;">
 <div style="flex:1; min-width:200px;">
 <label style="display:block; margin-bottom:8px; font-size:.85rem; color:var(--text-muted);">Select Excel/CSV File</label>
 <input type="file" id="studentsExcelFile" class="form-input" accept=".xlsx,.xls,.csv" style="padding:10px;">
 </div>
 <button class="admin-btn admin-btn-primary" onclick="importStudentsExcel()" style="padding:12px 20px; height: 46px;">Preview Import</button>
 </div>

 <!-- PREVIEW CONTAINER -->
 <div id="excelPreviewContainer" style="display:none; margin-top: 25px;">
 <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
 <h4 style="color:var(--primary-gold);">Data Preview</h4>
 <button class="admin-btn admin-btn-danger" onclick="replaceStudentsFromImported()">⚠️ Overwrite Directory with Preview</button>
 </div>
 <div class="excel-preview-wrapper">
 <table>
 <thead><tr id="excelPreviewHeaders"></tr></thead>
 <tbody id="excelPreviewTable"></tbody>
 </table>
 </div>
 </div>
 </div>

 <div class="ff-admin-card" style="margin-top:20px;">
 <div class="ff-admin-card-header">
 <div class="ff-admin-card-title"> Manual Editor</div>
 <button class="admin-btn admin-btn-secondary" onclick="addStudentRow()">+ Add Blank Row</button>
 </div>
 <div id="studentDirectoryEditor" style="display:grid; gap:14px;">
 <div class="ff-empty">Loading directory...</div>
 </div>
 </div>
 `;
}

async function loadStudentDirectoryData() {
 try {
 const res = await fetch(apiUrl('/api/student-directory'));
 const data = await res.json();
 if (data.success) {
 studentDirectoryData = data.students || [];
 renderStudentDirectoryEditor();
 }
 } catch (e) { showNotification('error', 'Error', e.message); }
}

function renderStudentDirectoryEditor() {
 const editor = document.getElementById('studentDirectoryEditor');
 if (!editor) return;
 if (!studentDirectoryData.length) {
 editor.innerHTML = `<div class="ff-empty">No students found. Import an Excel file above!</div>`;
 return;
 }
 editor.innerHTML = studentDirectoryData.map((s, i) => `
 <div style="padding:14px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); border-radius:12px;">
 <div style="display:grid; grid-template-columns:1fr 100px; gap:12px;">
 <div><label style="font-size:0.75rem;color:var(--text-muted);">Name</label><input class="form-input" style="padding:8px;" value="${escapeAttr(s.name)}" onchange="updateStudentField(${i}, 'name', this.value)"></div>
 <div><label style="font-size:0.75rem;color:var(--text-muted);">Section</label><input class="form-input" style="padding:8px;" value="${escapeAttr(s.section)}" onchange="updateStudentField(${i}, 'section', this.value)"></div>
 </div>
 <button class="admin-btn admin-btn-danger" style="margin-top:10px; font-size:0.75rem; padding:6px 12px;" onclick="removeStudentRow(${i})">Remove Row</button>
 </div>
 `).join('');
}

function addStudentRow() { studentDirectoryData.unshift({ name: '', section: '', photo: '' }); renderStudentDirectoryEditor(); }
function removeStudentRow(i) { studentDirectoryData.splice(i, 1); renderStudentDirectoryEditor(); }
function updateStudentField(i, field, val) { studentDirectoryData[i][field] = val; }

async function saveStudentDirectory() {
 try {
 const cleaned = studentDirectoryData.filter(s => s.name.trim() !== '');
 const res = await fetch(apiUrl('/api/admin/student-directory'), {
 method: 'POST',
 headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.adminToken}` },
 body: JSON.stringify({ students: cleaned })
 });
 const data = await res.json();
 if (data.success) {
 showNotification('success', 'Saved!', 'Directory updated successfully.');
 loadStudentDirectoryData();
 } else showNotification('error', 'Failed', data.error);
 } catch (e) { showNotification('error', 'Error', e.message); }
}

async function importStudentsExcel() {
 const input = document.getElementById('studentsExcelFile');
 const file = input?.files?.[0];
 if (!file) return showNotification('error', 'Missing File', 'Select a file first.');
 // Check if XLSX is loaded, try to wait for it
 if (typeof XLSX === 'undefined') {
 showNotification('info', 'Loading...', 'Excel processor loading, please wait...');
 await new Promise(resolve => setTimeout(resolve, 1000));
 if (typeof XLSX === 'undefined') {
 return showNotification('error', 'Error', 'Excel processor not loaded. Please refresh the page.');
 }
 }
 try {
 const arrayBuffer = await file.arrayBuffer();
 const workbook = XLSX.read(arrayBuffer, { type: 'array' });
 if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
 return showNotification('error', 'Invalid File', 'No sheets found in the file.');
 }
 const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
 const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
 if (!rows.length) return showNotification('error', 'Empty', 'No data found in the file.');
 console.log('[Students] Raw rows:', rows.length, rows[0]);
 // Standardize columns - handle many possible column name variations
 const validRows = rows.map(r => {
 // Find name field (case-insensitive)
 const nameKey = Object.keys(r).find(k => 
 /^(name|student|student.?name|full.?name)$/i.test(k.trim())
 );
 // Find section field (case-insensitive)
 const sectionKey = Object.keys(r).find(k => 
 /^(section|class|grade|division)$/i.test(k.trim())
 );
 return {
 name: String(r[nameKey] || r.name || r.Name || r.Student || r['Student Name'] || '').trim(),
 section: String(r[sectionKey] || r.section || r.Section || r.Class || r.Grade || '').trim(),
 photo: String(r.photo || r.Photo || r.image || r.Image || '').trim(),
 quote: String(r.quote || r.Quote || '').trim(),
 destination: String(r.destination || r.Destination || '').trim()
 };
 }).filter(s => s.name);
 if (!validRows.length) {
 return showNotification('error', 'No Valid Data', 'No valid student names found. Make sure you have a "Name" or "Student" column.');
 }
 window.__importBuffer = validRows;
 // Render Preview
 const previewContainer = document.getElementById('excelPreviewContainer');
 if (previewContainer) previewContainer.style.display = 'block';
 const headers = document.getElementById('excelPreviewHeaders');
 if (headers) headers.innerHTML = `<th>Name</th><th>Section</th>`;
 const tbody = document.getElementById('excelPreviewTable');
 if (tbody) {
 tbody.innerHTML = validRows.slice(0, 100).map(r => 
 `<tr><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.section)}</td></tr>`
 ).join('');
 if (validRows.length > 100) {
 tbody.innerHTML += `<tr><td colspan="2" style="text-align:center; color:var(--text-muted);">... and ${validRows.length - 100} more rows</td></tr>`;
 }
 }
 showNotification('success', 'Preview Ready', `Found ${validRows.length} students. Click "Overwrite Directory" to apply.`);
 } catch (e) {
 console.error('[Students] Import error:', e);
 showNotification('error', 'Import Failed', e.message);
 }
}

function replaceStudentsFromImported() {
 const buffer = window.__importBuffer;
 if (!buffer || !buffer.length) return;
 if (!confirm(`Are you sure you want to OVERWRITE the entire directory with these ${buffer.length} students?`)) return;
 
 studentDirectoryData = buffer;
 document.getElementById('excelPreviewContainer').style.display = 'none';
 renderStudentDirectoryEditor();
 showNotification('success', 'Replaced', 'Preview applied. Remember to click "Save All Changes" to finalize!');
}

function exportStudentDirectoryCsv() {
 const lines = ['name,section', ...studentDirectoryData.map(s => `"${s.name}","${s.section}"`)];
 const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
 const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
 a.download = 'students.csv'; a.click();
}

window.initStudentsPanelContent = initStudentsPanelContent;
window.addStudentRow = addStudentRow;
window.removeStudentRow = removeStudentRow;
window.updateStudentField = updateStudentField;
window.saveStudentDirectory = saveStudentDirectory;
window.importStudentsExcel = importStudentsExcel;
window.replaceStudentsFromImported = replaceStudentsFromImported;
window.exportStudentDirectoryCsv = exportStudentDirectoryCsv;
</script>
