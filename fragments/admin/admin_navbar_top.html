<script data-fragment-script="admin_nav_top">
// ═══════════════════════════════════════════════════════════════════════════════
// PERMISSION SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════

function can(permission) {
  if (!state.adminUser) return false;
  const role = state.adminUser.role || 'viewer';
  if (role === 'superadmin') return true;
  const permissions = {
    admin: ['moderation', 'editMemory', 'bulk', 'replaceFile', 'viewStats'],
    moderator: ['moderation', 'viewStats'],
    viewer: ['viewStats']
  };
  const rolePerms = permissions[role] || [];
  return rolePerms.includes(permission);
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN TAB SWITCHING
// ═══════════════════════════════════════════════════════════════════════════════

function switchAdminTab(tab) {
  console.log('switchAdminTab:', tab);

  // Remove active from all
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));

  // Find and activate tab
  const tabs = document.querySelectorAll('.admin-tab');
  tabs.forEach(t => {
    if (t.textContent.toLowerCase().includes(tab.toLowerCase()) || 
        t.getAttribute('onclick')?.includes(`'${tab}'`)) {
      t.classList.add('active');
    }
  });

  // Capitalize for panel ID
  const panelId = 'panel' + tab.charAt(0).toUpperCase() + tab.slice(1);
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');

  // Initialize panel content
  const initFnName = `init${tab.charAt(0).toUpperCase() + tab.slice(1)}PanelContent`;
  if (typeof window[initFnName] === 'function') {
    window[initFnName]();
  } else {
    console.warn(`Init function not found: ${initFnName}`);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN LOGIN/LOGOUT
// ═══════════════════════════════════════════════════════════════════════════════

function openAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) overlay.classList.add('active');
}

function closeAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) overlay.classList.remove('active');
  const errorEl = document.getElementById('adminLoginError');
  if (errorEl) errorEl.classList.remove('active');
}

async function adminLogin() {
  const userId = document.getElementById('adminUserId')?.value?.trim();
  const password = document.getElementById('adminPassword')?.value;
  const errorEl = document.getElementById('adminLoginError');

  if (!userId || !password) {
    if (errorEl) {
      errorEl.textContent = 'Please enter both Admin ID and password.';
      errorEl.classList.add('active');
    }
    return;
  }

  try {
    const res = await fetch(apiUrl('/api/admin/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, password })
    });
    const data = await res.json();

    if (data.success && data.token) {
      state.adminToken = data.token;
      state.adminUser = data.user || { userId, role: 'admin' };
      localStorage.setItem('adminToken', data.token);
      closeAdminLogin();
      openAdminDashboard();
      showNotification('success', 'Welcome!', `Logged in as ${data.user?.userId || userId}`);
    } else {
      if (errorEl) {
        errorEl.textContent = data.error || 'Invalid credentials.';
        errorEl.classList.add('active');
      }
    }
  } catch (e) {
    console.error('Admin login error:', e);
    if (errorEl) {
      errorEl.textContent = 'Connection error. Please try again.';
      errorEl.classList.add('active');
    }
  }
}

function openAdminDashboard() {
  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) {
    dashboard.classList.add('active');
    switchAdminTab('moderation');
  }
}

function adminLogout() {
  state.adminToken = null;
  state.adminUser = null;
  localStorage.removeItem('adminToken');

  // Reset all panels
  document.querySelectorAll('.admin-panel').forEach(p => {
    p.dataset.initialized = 'false';
    p.innerHTML = '';
  });

  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) dashboard.classList.remove('active');

  showNotification('info', 'Logged out', 'You have been logged out.');
}

// ═══════════════════════════════════════════════════════════════════════════════
// PLACEHOLDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

function approveAllPending() {
  if (typeof _approveAllPending === 'function') _approveAllPending();
  else showNotification('info', 'Info', 'Function not loaded yet.');
}

function downloadAllApproved() {
  if (typeof _downloadAllApproved === 'function') _downloadAllApproved();
  else {
    const token = state.adminToken;
    if (token) window.open(apiUrl(`/api/admin/download-all?token=${token}`), '_blank');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPOSE GLOBALLY
// ═══════════════════════════════════════════════════════════════════════════════

window.can = can;
window.switchAdminTab = switchAdminTab;
window.openAdminLogin = openAdminLogin;
window.closeAdminLogin = closeAdminLogin;
window.adminLogin = adminLogin;
window.openAdminDashboard = openAdminDashboard;
window.adminLogout = adminLogout;
window.approveAllPending = approveAllPending;
window.downloadAllApproved = downloadAllApproved;

console.log('✅ Admin Nav Top loaded');
</script>
