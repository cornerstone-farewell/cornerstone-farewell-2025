// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN TAB SWITCHING - CORE FUNCTION
// ═══════════════════════════════════════════════════════════════════════════════

function switchAdminTab(tab) {
  console.log('switchAdminTab called with:', tab);
  
  // Remove active class from all tabs and panels
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  
  // Capitalize first letter helper
  const capitalize = s => s.charAt(0).toUpperCase() + s.slice(1);
  
  // Add active class to selected tab and panel
  const tabEl = document.getElementById('tab' + capitalize(tab));
  const panelEl = document.getElementById('panel' + capitalize(tab));
  
  if (tabEl) {
    tabEl.classList.add('active');
    console.log('Activated tab:', tabEl.id);
  } else {
    console.warn('Tab element not found: tab' + capitalize(tab));
  }
  
  if (panelEl) {
    panelEl.classList.add('active');
    console.log('Activated panel:', panelEl.id);
  } else {
    console.warn('Panel element not found: panel' + capitalize(tab));
  }
  
  // Initialize panel content based on which tab is selected
  switch(tab) {
    case 'settings':
      initSettingsPanelContent();
      break;
    case 'theme':
      if (typeof initThemePanelContent === 'function') initThemePanelContent();
      break;
    case 'users':
      if (typeof initUsersPanelContent === 'function') initUsersPanelContent();
      break;
    case 'compilations':
      if (typeof initCompilationsPanelContent === 'function') initCompilationsPanelContent();
      break;
    case 'security':
      if (typeof initSecurityPanelContent === 'function') initSecurityPanelContent();
      break;
    case 'moderation':
      // Moderation panel is already in HTML, just refresh if needed
      if (typeof loadAdminMemories === 'function') loadAdminMemories();
      break;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN LOGIN/LOGOUT
// ═══════════════════════════════════════════════════════════════════════════════

function openAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) overlay.classList.add('active');
}

function closeAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) overlay.classList.remove('active');
  const errorEl = document.getElementById('adminLoginError');
  if (errorEl) errorEl.classList.remove('active');
}

async function adminLogin() {
  const userId = document.getElementById('adminUserId')?.value?.trim();
  const password = document.getElementById('adminPassword')?.value;
  const errorEl = document.getElementById('adminLoginError');
  
  if (!userId || !password) {
    if (errorEl) {
      errorEl.textContent = 'Please enter both Admin ID and password.';
      errorEl.classList.add('active');
    }
    return;
  }
  
  try {
    const res = await fetch(apiUrl('/api/admin/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, password })
    });
    
    const data = await res.json();
    
    if (data.success && data.token) {
      state.adminToken = data.token;
      state.adminUser = data.user;
      localStorage.setItem('adminToken', data.token);
      
      closeAdminLogin();
      openAdminDashboard();
      showNotification('success', 'Welcome!', `Logged in as ${data.user?.userId || userId}`);
    } else {
      if (errorEl) {
        errorEl.textContent = data.error || 'Invalid credentials. Please try again.';
        errorEl.classList.add('active');
      }
    }
  } catch (e) {
    console.error('Admin login error:', e);
    if (errorEl) {
      errorEl.textContent = 'Connection error. Please try again.';
      errorEl.classList.add('active');
    }
  }
}

function openAdminDashboard() {
  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) {
    dashboard.classList.add('active');
    // Initialize the default tab (moderation)
    switchAdminTab('moderation');
  }
}

function adminLogout() {
  state.adminToken = null;
  state.adminUser = null;
  localStorage.removeItem('adminToken');
  
  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) dashboard.classList.remove('active');
  
  showNotification('info', 'Logged out', 'You have been logged out of the admin panel.');
}

// ═══════════════════════════════════════════════════════════════════════════════
// INLINE EDITING
// ═══════════════════════════════════════════════════════════════════════════════
function makeInlineEditable(element, memoryId, field) {
  if (!element || (typeof can === 'function' && !can('editMemory'))) return;
  element.classList.add('inline-editable');
  element.setAttribute('data-memory-id', memoryId);
  element.setAttribute('data-field', field);
  element.addEventListener('dblclick', function(e) {
    e.stopPropagation();
    startInlineEdit(this);
  });
}

function startInlineEdit(element) {
  if (element.classList.contains('editing')) return;
  const originalText = element.textContent;
  element.classList.add('editing');
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'inline-edit-input';
  input.value = originalText;
  element.textContent = '';
  element.appendChild(input);
  input.focus();
  input.select();
  
  const save = async () => {
    const newValue = input.value.trim();
    element.classList.remove('editing');
    element.textContent = newValue || originalText;
    if (newValue && newValue !== originalText) {
      try {
        const res = await fetch(apiUrl('/api/admin/memory/edit/' + element.getAttribute('data-memory-id')), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + state.adminToken
          },
          body: JSON.stringify({ [element.getAttribute('data-field')]: newValue })
        });
        const data = await res.json();
        if (data.success) {
          showNotification('success', 'Saved', 'Updated ' + element.getAttribute('data-field'));
        } else {
          element.textContent = originalText;
          showNotification('error', 'Failed', data.error);
        }
      } catch (e) {
        element.textContent = originalText;
        showNotification('error', 'Error', e.message);
      }
    }
  };
  
  input.addEventListener('blur', save);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') save();
    if (e.key === 'Escape') {
      element.classList.remove('editing');
      element.textContent = originalText;
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// BATCH UPLOAD (ADMIN)
// ═══════════════════════════════════════════════════════════════════════════════
function openBatchUpload() {
  const modal = document.getElementById('batchUploadModal');
  if (modal) {
    modal.classList.add('active');
    const batchName = document.getElementById('batchName');
    const batchCaption = document.getElementById('batchCaption');
    const batchType = document.getElementById('batchType');
    const batchFiles = document.getElementById('batchFiles');
    const batchFileLabel = document.getElementById('batchFileLabel');
    const batchProgress = document.getElementById('batchProgress');
    const btnStartBatch = document.getElementById('btnStartBatch');
    
    if (batchName) batchName.value = '';
    if (batchCaption) batchCaption.value = '';
    if (batchType) batchType.value = 'Friends';
    if (batchFiles) batchFiles.value = '';
    if (batchFileLabel) batchFileLabel.textContent = 'Click to select files';
    if (batchProgress) batchProgress.style.display = 'none';
    if (btnStartBatch) btnStartBatch.disabled = false;
  }
}

function closeBatchUpload() {
  const modal = document.getElementById('batchUploadModal');
  if (modal) modal.classList.remove('active');
}

function updateBatchFileCount(input) {
  const label = document.getElementById('batchFileLabel');
  if (label) {
    label.textContent = input.files && input.files.length > 0 
      ? `${input.files.length} file(s) selected` 
      : 'Click to select files';
  }
}

async function submitBatchUpload() {
  const name = document.getElementById('batchName')?.value?.trim();
  const caption = document.getElementById('batchCaption')?.value?.trim();
  const type = document.getElementById('batchType')?.value;
  const fileInput = document.getElementById('batchFiles');
  const autoApproveEl = document.getElementById('batchAutoApprove');
  const autoApprove = autoApproveEl ? autoApproveEl.checked : true;
  
  if (!name || !caption || !fileInput?.files?.length) {
    return showNotification('error', 'Missing fields', 'Fill all fields and select files.');
  }
  
  const btnStartBatch = document.getElementById('btnStartBatch');
  if (btnStartBatch) btnStartBatch.disabled = true;
  
  const progressDiv = document.getElementById('batchProgress');
  const fill = document.getElementById('batchProgressFill');
  const text = document.getElementById('batchProgressText');
  if (progressDiv) progressDiv.style.display = 'block';
  
  const files = Array.from(fileInput.files);
  const total = files.length;
  let successCount = 0;
  const CHUNK_SIZE = 5;
  
  for (let i = 0; i < total; i += CHUNK_SIZE) {
    const chunk = files.slice(i, i + CHUNK_SIZE);
    const fd = new FormData();
    fd.append('name', name);
    fd.append('caption', caption);
    fd.append('type', type);
    fd.append('autoApprove', autoApprove ? 'true' : 'false');
    chunk.forEach(f => fd.append('files', f));
    
    try {
      if (text) text.textContent = `Uploading batch ${Math.ceil((i+1)/CHUNK_SIZE)} of ${Math.ceil(total/CHUNK_SIZE)}...`;
      const res = await fetch(apiUrl('/api/admin/upload-batch'), {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${state.adminToken}` },
        body: fd
      });
      const data = await res.json();
      if (data.success) {
        successCount += (data.count || 0);
      } else {
        showNotification('error', 'Error in chunk', data.error);
      }
      if (fill) fill.style.width = Math.min(100, Math.round(((i + chunk.length) / total) * 100)) + '%';
    } catch (e) {
      console.error(e);
    }
  }
  
  showNotification('success', 'Batch Complete', `${successCount} uploaded successfully.`);
  closeBatchUpload();
  if (typeof loadAdminMemories === 'function') loadAdminMemories(true);
}
