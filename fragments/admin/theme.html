<!-- FRAGMENT: admin_theme -->

<script data-fragment-script="admin_theme">
// ═══════════════════════════════════════════════════════════════════════════════
// THEME PANEL
// ═══════════════════════════════════════════════════════════════════════════════

function renderThemePanelHtml() {
  return `
  <div class="stat-card" style="text-align:left;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
      <h3 style="font-family:var(--font-display); color:var(--primary-gold); font-size:1.3rem;">🎨 Theme Editor</h3>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="admin-btn admin-btn-secondary" onclick="resetThemeDefaults()">↺ Reset</button>
        <button class="admin-btn admin-btn-primary" onclick="saveTheme()">💾 Save Theme</button>
      </div>
    </div>
    <div class="mini-pill" style="margin-top:12px;">Changes apply live. Save to persist.</div>
    <div style="margin-top:16px; display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:14px;">
      <div class="form-group"><label>Primary Gold</label><input class="form-input theme-color-input" type="color" id="themePrimaryGold" /></div>
      <div class="form-group"><label>Gold Light</label><input class="form-input theme-color-input" type="color" id="themePrimaryGoldLight" /></div>
      <div class="form-group"><label>Gold Dark</label><input class="form-input theme-color-input" type="color" id="themePrimaryGoldDark" /></div>
      <div class="form-group"><label>Navy Dark</label><input class="form-input theme-color-input" type="color" id="themeNavyDark" /></div>
      <div class="form-group"><label>Navy Medium</label><input class="form-input theme-color-input" type="color" id="themeNavyMedium" /></div>
      <div class="form-group"><label>Navy Light</label><input class="form-input theme-color-input" type="color" id="themeNavyLight" /></div>
      <div class="form-group"><label>Accent Rose</label><input class="form-input theme-color-input" type="color" id="themeAccentRose" /></div>
      <div class="form-group"><label>Accent Purple</label><input class="form-input theme-color-input" type="color" id="themeAccentPurple" /></div>
      <div class="form-group"><label>Text Light</label><input class="form-input theme-color-input" type="color" id="themeTextLight" /></div>
      <div class="form-group"><label>Text Muted (rgba)</label><input class="form-input theme-text-input" id="themeTextMuted" placeholder="rgba(255,255,255,0.7)" /></div>
      <div class="form-group"><label>Glass BG (rgba)</label><input class="form-input theme-text-input" id="themeGlassBg" placeholder="rgba(255,255,255,0.1)" /></div>
      <div class="form-group"><label>Glass Border (rgba)</label><input class="form-input theme-text-input" id="themeGlassBorder" placeholder="rgba(255,255,255,0.2)" /></div>
      <div class="form-group"><label>Success Green</label><input class="form-input theme-color-input" type="color" id="themeSuccessGreen" /></div>
      <div class="form-group"><label>Error Red</label><input class="form-input theme-color-input" type="color" id="themeErrorRed" /></div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// INITIALIZE PANEL
// ═══════════════════════════════════════════════════════════════════════════════

function initThemePanelContent() {
  console.log('initThemePanelContent called');

  const panel = document.getElementById('panelTheme');
  if (!panel) {
    console.error('panelTheme not found');
    return;
  }

  // Use data attribute instead of length check
  if (panel.dataset.initialized !== 'true') {
    console.log('Rendering theme panel HTML...');
    panel.innerHTML = renderThemePanelHtml();
    panel.dataset.initialized = 'true';
  }

  // Always wire up and sync (in case values changed)
  setTimeout(() => {
    wireThemePanel();
  }, 50);
}

function wireThemePanel() {
  // Add live preview listeners to color inputs
  document.querySelectorAll('.theme-color-input, .theme-text-input').forEach(el => {
    if (!el.dataset.listenerAdded) {
      el.dataset.listenerAdded = '1';
      el.addEventListener('input', () => {
        if (!state.settings) state.settings = {};
        state.settings.theme = readThemeFromEditor();
        if (typeof applyThemeToCSS === 'function') applyThemeToCSS();
      });
    }
  });

  syncThemeEditor();
}

function syncThemeEditor() {
  const t = state.settings?.theme || {};

  setVal('themePrimaryGold', t.primaryGold || '#D4AF37');
  setVal('themePrimaryGoldLight', t.primaryGoldLight || '#F4E5B2');
  setVal('themePrimaryGoldDark', t.primaryGoldDark || '#B8860B');
  setVal('themeNavyDark', t.navyDark || '#1a1a2e');
  setVal('themeNavyMedium', t.navyMedium || '#16213e');
  setVal('themeNavyLight', t.navyLight || '#0f3460');
  setVal('themeAccentRose', t.accentRose || '#e94560');
  setVal('themeAccentPurple', t.accentPurple || '#7B2D8E');
  setVal('themeTextLight', t.textLight || '#ffffff');
  setVal('themeTextMuted', t.textMuted || 'rgba(255, 255, 255, 0.7)');
  setVal('themeGlassBg', t.glassBg || 'rgba(255, 255, 255, 0.1)');
  setVal('themeGlassBorder', t.glassBorder || 'rgba(255, 255, 255, 0.2)');
  setVal('themeSuccessGreen', t.successGreen || '#4CAF50');
  setVal('themeErrorRed', t.errorRed || '#f44336');
}

function readThemeFromEditor() {
  return {
    primaryGold: getVal('themePrimaryGold'),
    primaryGoldLight: getVal('themePrimaryGoldLight'),
    primaryGoldDark: getVal('themePrimaryGoldDark'),
    navyDark: getVal('themeNavyDark'),
    navyMedium: getVal('themeNavyMedium'),
    navyLight: getVal('themeNavyLight'),
    accentRose: getVal('themeAccentRose'),
    accentPurple: getVal('themeAccentPurple'),
    textLight: getVal('themeTextLight'),
    textMuted: getVal('themeTextMuted'),
    glassBg: getVal('themeGlassBg'),
    glassBorder: getVal('themeGlassBorder'),
    successGreen: getVal('themeSuccessGreen'),
    errorRed: getVal('themeErrorRed'),
  };
}

function resetThemeDefaults() {
  if (!confirm('Reset theme to defaults?')) return;

  if (!state.settings) state.settings = {};
  state.settings.theme = structuredClone(DEFAULT_SETTINGS.theme);

  syncThemeEditor();
  if (typeof applyThemeToCSS === 'function') applyThemeToCSS();

  showNotification('info', 'Reset', 'Theme reset to defaults (not saved yet)');
}

async function saveTheme() {
  const theme = readThemeFromEditor();
  const merged = structuredClone(state.settings || {});
  merged.theme = theme;

  try {
    const res = await fetch(apiUrl('/api/admin/settings'), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.adminToken}`
      },
      body: JSON.stringify({ settings: merged })
    });

    const data = await res.json();

    if (data.success) {
      state.settings = mergeDeep(structuredClone(DEFAULT_SETTINGS), merged);
      showNotification('success', 'Saved', 'Theme saved successfully.');
    } else {
      showNotification('error', 'Failed', data.error || 'Could not save theme.');
    }
  } catch (e) {
    showNotification('error', 'Failed', e.message);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPOSE GLOBALLY
// ═══════════════════════════════════════════════════════════════════════════════

window.initThemePanelContent = initThemePanelContent;
window.renderThemePanelHtml = renderThemePanelHtml;
window.wireThemePanel = wireThemePanel;
window.syncThemeEditor = syncThemeEditor;
window.readThemeFromEditor = readThemeFromEditor;
window.resetThemeDefaults = resetThemeDefaults;
window.saveTheme = saveTheme;

console.log('✅ Admin Theme loaded');
</script>
