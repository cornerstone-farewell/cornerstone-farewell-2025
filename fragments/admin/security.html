<style data-fragment-style="admin_security">

.sec-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
  margin-top: 6px;
}
.sec-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;

.sec-card.danger-card {
  border-color: rgba(244, 67, 54, 0.30);

  align-items: center;
  gap: 12px;

.sec-card-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: rgba(212,175,55,0.12);
  border: 1px solid rgba(212,175,55,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;

  font-weight: 700;
  font-size: 1rem;

/* ── Audit Log ── */
.sec-audit-list {
  display: grid;
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--primary-gold) rgba(255,255,255,0.05);

}
.sec-audit-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 10px 12px;
  border-radius: 12px;

  background: rgba(0,0,0,0.18);
  font-size: 0.85rem;
}
.sec-audit-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.sec-audit-dot.ok   { background: #4CAF50; box-shadow: 0 0 6px rgba(76,175,80,.5); }
.sec-audit-dot.fail { background: #f44336; box-shadow: 0 0 6px rgba(244,67,54,.5); }
.sec-audit-dot.warn { background: #FFC107; box-shadow: 0 0 6px rgba(255,193,7,.5); }
.sec-audit-body { flex: 1; min-width: 0; }
.sec-audit-action { font-weight: 600; color: var(--text-light); }

/* ── Sessions ── */
.sec-session-list { display: grid; gap: 8px; }
.sec-session-item {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.15);
  font-size: 0.85rem;
}
.sec-session-info { flex: 1; }
.sec-session-user { font-weight: 700; color: var(--text-light); }
.sec-session-detail { color: var(--text-muted); font-size: 0.78rem; margin-top: 2px; }
.sec-session-badge {
  padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
}
.sec-session-badge.you  { background: rgba(76,175,80,0.2); color: #8ff09a; border: 1px solid rgba(76,175,80,0.35); }
.sec-session-badge.other { background: rgba(255,193,7,0.15); color: #ffe082; border: 1px solid rgba(255,193,7,0.30); }

/* ── Ban list ── */
.sec-ban-list { display: grid; gap: 8px; max-height: 220px; overflow-y: auto; padding-right: 4px; scrollbar-width: thin; scrollbar-color: var(--primary-gold) rgba(255,255,255,0.05); }
.sec-ban-item {
  display: flex; justify-content: space-between; align-items: center;
  gap: 10px; flex-wrap: wrap;
  padding: 9px 12px;
  border-radius: 12px;
  border: 1px solid rgba(244,67,54,0.20);
  background: rgba(244,67,54,0.06);
  font-size: 0.85rem;
}
.sec-ban-label { color: var(--text-light); font-weight: 600; word-break: break-all; }
.sec-ban-reason { color: var(--text-muted); font-size: 0.78rem; }

/* ── Maintenance toggle ── */
.sec-maintenance-status {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.12);
}
.sec-maintenance-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  transition: background 0.3s;
}
.sec-maintenance-dot.on  { background: #f44336; box-shadow: 0 0 8px rgba(244,67,54,.6); }
.sec-maintenance-dot.off { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,.6); }

/* ── Inputs inside sec cards ── */
.sec-input-row { display: flex; gap: 8px; flex-wrap: wrap; }
.sec-input-row .form-input { flex: 1; min-width: 160px; padding: 11px 14px; font-size: 0.9rem; border-radius: 12px; }
.sec-input-row .admin-btn  { white-space: nowrap; }

/* ── Section header inside panel ── */
.sec-section-header {
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
  margin-bottom: 20px;
}
.sec-section-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary-gold);
}
.sec-section-sub { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; }

/* ── Empty state ── */
.sec-empty {
  text-align: center; color: var(--text-muted); font-size: 0.9rem;
  padding: 24px 12px;
}

/* ── Progress bar for export ── */
.sec-export-progress {
  display: none;
  margin-top: 10px;
}
.sec-export-progress.visible { display: block; }

@media (max-width: 600px) {
  .sec-grid { grid-template-columns: 1fr; }
}
</style>

<script data-fragment-script="admin_security">
// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN SECURITY PANEL
// ═══════════════════════════════════════════════════════════════════════════════

// ── In-memory store for ban list & audit log (persisted via API when available) ──
const _sec = {
  auditLog: [],      // [{ts, action, detail, level}]
  sessions: [],      // [{token, userId, role, loginAt, ip, isCurrent}]
  bans: [],          // [{type, value, reason, bannedAt}]
  maintenanceOn: false,
  _auditLoaded: false,
  _sessionsLoaded: false,
  _bansLoaded: false,
  _maintenanceLoaded: false,
};

// ── Helpers ──────────────────────────────────────────────────────────────────

function _secAuthHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.adminToken };
}

function _secTimestamp() {
  return new Intl.DateTimeFormat('en-IN', {
    timeZone: 'Asia/Kolkata',
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  }).format(new Date());
}

function _secPushAudit(action, detail, level = 'ok') {
  _sec.auditLog.unshift({ ts: _secTimestamp(), action, detail, level });
  if (_sec.auditLog.length > 200) _sec.auditLog.length = 200;
}

function _secEl(id) { return document.getElementById(id); }

// ── Panel entry-point (called by switchAdminTab) ──────────────────────────────

async function initSecurityPanelContent() {
  const panel = _secEl('panelSecurity');
  if (!panel) return;

  panel.innerHTML = `
    <div class="sec-section-header">
      <div>
        <div class="sec-section-title">🔒 Security</div>
        <div class="sec-section-sub">Manage passwords, sessions, access control and site safety</div>
      </div>
      <button class="admin-btn admin-btn-secondary" onclick="initSecurityPanelContent()">🔄 Refresh</button>
    </div>
    <div class="sec-grid" id="secGrid">
      ${_secCardChangePassword()}
      ${_secCardResetHashes()}
      ${_secCardSessions()}
      ${_secCardAuditLog()}
      ${_secCardBanList()}
      ${_secCardMaintenance()}
      ${_secCardExport()}
      ${_secCardWipeMemories()}
    </div>`;

  // Wire up dynamic sections
  await Promise.all([
    _secLoadSessions(),
    _secLoadAuditLog(),
    _secLoadBans(),
    _secLoadMaintenanceStatus(),
  ]);
}

// ─────────────────────────────────────────────────────────────────────────────
// CARD: Change Admin Password
// ─────────────────────────────────────────────────────────────────────────────

function _secCardChangePassword() {
  return `
  <div class="sec-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">🔑</div>
      <div>
        <div class="sec-card-title">Change Password</div>
        <div class="sec-card-desc">Update the password for the currently logged-in admin account.</div>
      </div>
    </div>
    <div class="form-group" style="margin:0;">
      <label style="font-size:.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Current Password</label>
      <input class="form-input" id="secOldPass" type="password" placeholder="Current password" style="border-radius:12px; padding:11px 14px;"/>
    </div>
    <div class="form-group" style="margin:0;">
      <label style="font-size:.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">New Password <span style="color:var(--accent-rose)">*</span></label>
      <input class="form-input" id="secNewPass" type="password" placeholder="Min 8 characters" style="border-radius:12px; padding:11px 14px;"/>
    </div>
    <div class="form-group" style="margin:0;">
      <label style="font-size:.85rem; color:var(--text-muted); display:block; margin-bottom:6px;">Confirm New Password</label>
      <input class="form-input" id="secConfPass" type="password" placeholder="Re-enter new password" style="border-radius:12px; padding:11px 14px;"/>
    </div>
    <div id="secPassMsg" style="font-size:.83rem; min-height:18px; color:var(--accent-rose);"></div>
    <button class="admin-btn admin-btn-primary" onclick="secChangePassword()" style="width:100%; justify-content:center;">🔒 Update Password</button>
  </div>`;
}

async function secChangePassword() {
  const oldPass  = _secEl('secOldPass')?.value || '';
  const newPass  = _secEl('secNewPass')?.value || '';
  const confPass = _secEl('secConfPass')?.value || '';
  const msg = _secEl('secPassMsg');

  const setMsg = (t, color = 'var(--accent-rose)') => { if (msg) { msg.textContent = t; msg.style.color = color; } };

  if (!newPass || newPass.length < 8) return setMsg('New password must be at least 8 characters.');
  if (newPass !== confPass) return setMsg('Passwords do not match.');

  const userId = state.adminUser?.userId || state.adminUser?.id;
  if (!userId) return setMsg('Could not determine current admin user.');

  try {
    const res = await fetch(apiUrl('/api/admin/users/' + encodeURIComponent(userId)), {
      method: 'PATCH',
      headers: _secAuthHeaders(),
      body: JSON.stringify({ oldPassword: oldPass || undefined, password: newPass }),
    });
    const data = await res.json();
    if (res.status === 401) { adminLogout(); return; }
    if (data.success) {
      setMsg('✓ Password updated successfully!', '#8ff09a');
      _secPushAudit('Password changed', `User: ${userId}`, 'ok');
      if (_secEl('secOldPass')) _secEl('secOldPass').value = '';
      if (_secEl('secNewPass')) _secEl('secNewPass').value = '';
      if (_secEl('secConfPass')) _secEl('secConfPass').value = '';
    } else {
      setMsg(data.error || 'Failed to update password.');
      _secPushAudit('Password change failed', `User: ${userId} — ${data.error}`, 'fail');
    }
  } catch (e) {
    setMsg('Connection error: ' + e.message);
    _secPushAudit('Password change error', e.message, 'fail');
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CARD: Reset Upload Hashes
// ─────────────────────────────────────────────────────────────────────────────

function _secCardResetHashes() {
  return `
  <div class="sec-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">♻️</div>
      <div>
        <div class="sec-card-title">Reset Upload Hashes</div>
        <div class="sec-card-desc">Clears duplicate-detection fingerprints so previously blocked files can be re-uploaded.</div>
      </div>
    </div>
    <div class="callout" style="margin:0;">
      Use this if users report their files are being rejected as duplicates even though they shouldn't be.
    </div>
    <button class="admin-btn admin-btn-secondary" onclick="secResetHashes()" style="width:100%; justify-content:center;">♻️ Reset Hashes</button>
  </div>`;
}

async function secResetHashes() {
  if (!confirm('Reset all duplicate detection hashes? Users will be able to re-upload previously blocked files.')) return;
  try {
    const res = await fetch(apiUrl('/api/admin/reset-hashes'), {
      method: 'POST',
      headers: _secAuthHeaders(),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success) {
      showNotification('success', 'Hashes Reset', 'Duplicate detection fingerprints cleared.');
      _secPushAudit('Upload hashes reset', 'All duplicate fingerprints cleared', 'warn');
    } else {
      showNotification('error', 'Failed', data.error || 'Could not reset hashes.');
      _secPushAudit('Hash reset failed', data.error, 'fail');
    }
  } catch (e) {
    showNotification('error', 'Error', e.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CARD: Active Sessions
// ─────────────────────────────────────────────────────────────────────────────

function _secCardSessions() {
  return `
  <div class="sec-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">🖥️</div>
      <div>
        <div class="sec-card-title">Active Sessions</div>
        <div class="sec-card-desc">See who is currently logged in and force-logout any session.</div>
      </div>
    </div>
    <div class="sec-session-list" id="secSessionList">
      <div class="sec-empty">Loading sessions…</div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="admin-btn admin-btn-secondary" onclick="_secLoadSessions()" style="flex:1; justify-content:center;">🔄 Refresh</button>
      <button class="admin-btn admin-btn-danger"    onclick="secForceLogoutAll()" style="flex:1; justify-content:center;">🚪 Logout All Others</button>
    </div>
  </div>`;
}

async function _secLoadSessions() {
  const list = _secEl('secSessionList');
  if (!list) return;
  try {
    const res = await fetch(apiUrl('/api/admin/sessions'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (res.ok) {
      const data = await res.json();
      _sec.sessions = data.sessions || [];
    } else {
      // API may not exist yet; show a synthetic "current" session
      _sec.sessions = [{
        tokenHint: '…' + (state.adminToken || '').slice(-6),
        userId: state.adminUser?.userId || 'you',
        role: state.adminUser?.role || 'admin',
        loginAt: 'This session',
        ip: '—',
        isCurrent: true,
      }];
    }
  } catch {
    _sec.sessions = [{
      tokenHint: '…' + (state.adminToken || '').slice(-6),
      userId: state.adminUser?.userId || 'you',
      role: state.adminUser?.role || 'admin',
      loginAt: 'This session',
      ip: '—',
      isCurrent: true,
    }];
  }
  _secRenderSessions();
}

function _secRenderSessions() {
  const list = _secEl('secSessionList');
  if (!list) return;
  if (!_sec.sessions.length) { list.innerHTML = '<div class="sec-empty">No active sessions found.</div>'; return; }
  list.innerHTML = _sec.sessions.map((s, i) => `
    <div class="sec-session-item">
      <div class="sec-session-info">
        <div class="sec-session-user">${escapeHtml(s.userId || s.id || 'Unknown')}</div>
        <div class="sec-session-detail">
          Role: ${escapeHtml(s.role || '—')} &nbsp;·&nbsp; ${escapeHtml(s.loginAt || s.createdAt || '—')}
          ${s.ip && s.ip !== '—' ? ` &nbsp;·&nbsp; ${escapeHtml(s.ip)}` : ''}
        </div>
      </div>
      <span class="sec-session-badge ${s.isCurrent ? 'you' : 'other'}">${s.isCurrent ? '● You' : 'Active'}</span>
      ${!s.isCurrent ? `<button class="admin-btn admin-btn-danger" style="padding:6px 12px; font-size:.8rem;" onclick="secForceLogoutSession(${i})">Kick</button>` : ''}
    </div>`).join('');
}

async function secForceLogoutSession(idx) {
  const session = _sec.sessions[idx];
  if (!session) return;
  if (!confirm(`Force-logout session for "${session.userId}"?`)) return;
  try {
    const res = await fetch(apiUrl('/api/admin/sessions/' + encodeURIComponent(session.id || session.tokenHint || idx)), {
      method: 'DELETE',
      headers: _secAuthHeaders(),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success || res.ok) {
      showNotification('success', 'Session Ended', `Kicked session for ${session.userId}`);
      _secPushAudit('Session force-logout', `User: ${session.userId}`, 'warn');
      _sec.sessions.splice(idx, 1);
      _secRenderSessions();
    } else {
      showNotification('error', 'Failed', data.error || 'Could not end session.');
    }
  } catch (e) {
    showNotification('error', 'Error', e.message);
  }
}

async function secForceLogoutAll() {
  if (!confirm('Force-logout ALL other admin sessions? Your own session will remain active.')) return;
  try {
    const res = await fetch(apiUrl('/api/admin/sessions'), {
      method: 'DELETE',
      headers: _secAuthHeaders(),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success || res.ok) {
      showNotification('success', 'All Sessions Ended', 'Other admin sessions have been terminated.');
      _secPushAudit('All other sessions force-logged out', 'Bulk revocation', 'warn');
      await _secLoadSessions();
    } else {
      showNotification('error', 'Failed', data.error || 'Could not end sessions.');
    }
  } catch (e) {
    showNotification('error', 'Error', e.message);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CARD: Audit Log
// ─────────────────────────────────────────────────────────────────────────────

function _secCardAuditLog() {
  return `
  <div class="sec-card" style="grid-column: span 1;">
    <div class="sec-card-header">
      <div class="sec-card-icon">📋</div>
      <div>
        <div class="sec-card-title">Login & Activity Log</div>
        <div class="sec-card-desc">Recent admin actions and authentication events.</div>
      </div>
    </div>
    <div class="sec-audit-list" id="secAuditList">
      <div class="sec-empty">Loading log…</div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="admin-btn admin-btn-secondary" onclick="_secLoadAuditLog()" style="flex:1; justify-content:center;">🔄 Refresh</button>
      <button class="admin-btn admin-btn-secondary" onclick="secExportAuditLog()" style="flex:1; justify-content:center;">📥 Export</button>
    </div>
  </div>`;
}

async function _secLoadAuditLog() {
  const list = _secEl('secAuditList');
  if (!list) return;
  try {
    const res = await fetch(apiUrl('/api/admin/audit-log'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (res.ok) {
      const data = await res.json();
      if (data.log && data.log.length) {
        // Merge server log with local (server takes precedence, keep local recents)
        const serverEntries = data.log.map(e => ({ ts: e.ts || e.createdAt || '', action: e.action || e.event || '', detail: e.detail || e.meta || '', level: e.level || 'ok' }));
        _sec.auditLog = [..._sec.auditLog, ...serverEntries].slice(0, 200);
      }
    }
  } catch { /* use local log */ }
  _secRenderAuditLog();
}

function _secRenderAuditLog() {
  const list = _secEl('secAuditList');
  if (!list) return;
  if (!_sec.auditLog.length) {
    list.innerHTML = '<div class="sec-empty">No activity recorded yet in this session.</div>';
    return;
  }
  list.innerHTML = _sec.auditLog.map(e => `
    <div class="sec-audit-item">
      <div class="sec-audit-dot ${escapeHtml(e.level || 'ok')}"></div>
      <div class="sec-audit-body">
        <div class="sec-audit-action">${escapeHtml(e.action)}</div>
        <div class="sec-audit-meta">${escapeHtml(e.detail)} &nbsp;·&nbsp; ${escapeHtml(e.ts)}</div>
      </div>
    </div>`).join('');
}

function secExportAuditLog() {
  if (!_sec.auditLog.length) { showNotification('info', 'Empty', 'No audit log entries to export.'); return; }
  const csv = ['Timestamp,Level,Action,Detail',
    ..._sec.auditLog.map(e => `"${e.ts}","${e.level}","${e.action.replace(/"/g,'""')}","${(e.detail||'').replace(/"/g,'""')}"`)
  ].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `audit_log_${Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  _secPushAudit('Audit log exported', `${_sec.auditLog.length} entries`, 'ok');
}

// ─────────────────────────────────────────────────────────────────────────────
// CARD: Ban / Block Users
// ─────────────────────────────────────────────────────────────────────────────

function _secCardBanList() {
  return `
  <div class="sec-card danger-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">🚫</div>
      <div>
        <div class="sec-card-title">Ban / Block</div>
        <div class="sec-card-desc">Block a user name or IP address from uploading or interacting.</div>
      </div>
    </div>
    <div class="sec-input-row">
      <input class="form-input" id="secBanValue" placeholder="Name or IP address" />
      <input class="form-input" id="secBanReason" placeholder="Reason (optional)" style="flex:1.5;" />
      <button class="admin-btn admin-btn-danger" onclick="secAddBan()">Ban</button>
    </div>
    <div class="sec-ban-list" id="secBanList">
      <div class="sec-empty">Loading ban list…</div>
    </div>
  </div>`;
}

async function _secLoadBans() {
  const list = _secEl('secBanList');
  if (!list) return;
  try {
    const res = await fetch(apiUrl('/api/admin/bans'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (res.ok) {
      const data = await res.json();
      _sec.bans = data.bans || [];
    }
  } catch { _sec.bans = []; }
  _secRenderBans();
}

function _secRenderBans() {
  const list = _secEl('secBanList');
  if (!list) return;
  if (!_sec.bans.length) { list.innerHTML = '<div class="sec-empty">No bans in effect.</div>'; return; }
  list.innerHTML = _sec.bans.map((b, i) => `
    <div class="sec-ban-item">
      <div>
        <div class="sec-ban-label">🚫 ${escapeHtml(b.value)}</div>
        ${b.reason ? `<div class="sec-ban-reason">${escapeHtml(b.reason)}</div>` : ''}
      </div>
      <button class="admin-btn" style="padding:5px 12px; font-size:.8rem; background:rgba(255,255,255,.08); color:var(--text-muted); border:1px solid rgba(255,255,255,.15);" onclick="secRemoveBan(${i})">Unban</button>
    </div>`).join('');
}

async function secAddBan() {
  const value  = (_secEl('secBanValue')?.value  || '').trim();
  const reason = (_secEl('secBanReason')?.value || '').trim();
  if (!value) { showNotification('error', 'Required', 'Enter a name or IP to ban.'); return; }
  try {
    const res = await fetch(apiUrl('/api/admin/bans'), {
      method: 'POST',
      headers: _secAuthHeaders(),
      body: JSON.stringify({ value, reason }),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success || res.ok) {
      showNotification('success', 'Banned', `"${value}" has been blocked.`);
      _secPushAudit('User/IP banned', `${value} — ${reason || 'no reason'}`, 'warn');
      _sec.bans.unshift({ value, reason, bannedAt: _secTimestamp() });
      _secRenderBans();
      if (_secEl('secBanValue'))  _secEl('secBanValue').value  = '';
      if (_secEl('secBanReason')) _secEl('secBanReason').value = '';
    } else {
      showNotification('error', 'Failed', data.error || 'Could not add ban.');
    }
  } catch (e) {
    // API might not exist; store locally
    _sec.bans.unshift({ value, reason, bannedAt: _secTimestamp() });
    _secRenderBans();
    showNotification('info', 'Stored Locally', 'Ban added (API endpoint not available; stored in session).');
    _secPushAudit('User/IP banned (local)', `${value}`, 'warn');
    if (_secEl('secBanValue'))  _secEl('secBanValue').value  = '';
    if (_secEl('secBanReason')) _secEl('secBanReason').value = '';
  }
}

async function secRemoveBan(idx) {
  const ban = _sec.bans[idx];
  if (!ban) return;
  if (!confirm(`Unban "${ban.value}"?`)) return;
  try {
    const res = await fetch(apiUrl('/api/admin/bans/' + encodeURIComponent(ban.id || ban.value)), {
      method: 'DELETE',
      headers: _secAuthHeaders(),
    });
    if (res.status === 401) { adminLogout(); return; }
  } catch { /* ok */ }
  _sec.bans.splice(idx, 1);
  _secRenderBans();
  showNotification('success', 'Unbanned', `"${ban.value}" has been unblocked.`);
  _secPushAudit('Ban removed', ban.value, 'ok');
}

function _secCardMaintenance() {
  return `
  <div class="sec-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">🛠️</div>
      <div>
        <div class="sec-card-title">Maintenance Mode</div>
        <div class="sec-card-desc">When enabled, the public site shows a maintenance message and all uploads are paused.</div>
      </div>
    </div>
    <div class="sec-maintenance-status" id="secMaintenanceStatus">
      <div class="sec-maintenance-dot off" id="secMaintenanceDot"></div>
      <div>
        <div id="secMaintenanceLabel" style="font-weight:700;">Site is LIVE</div>
        <div style="font-size:.8rem; color:var(--text-muted);" id="secMaintenanceSub">Public can access the site normally.</div>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="admin-btn admin-btn-danger" id="secMaintenanceBtn" onclick="secToggleMaintenance()" style="flex:1; justify-content:center;">
        Enable Maintenance
      </button>
    </div>
  </div>`;
}

async function _secLoadMaintenanceStatus() {
  try {
    const res = await fetch(apiUrl('/api/admin/maintenance'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (res.ok) {
      const data = await res.json();
      _sec.maintenanceOn = !!(data.enabled || data.maintenanceMode);
    }
  } catch { _sec.maintenanceOn = !!(state.settings?.maintenanceMode); }
  _secRenderMaintenanceStatus();
}

function _secRenderMaintenanceStatus() {
  const dot   = _secEl('secMaintenanceDot');
  const label = _secEl('secMaintenanceLabel');
  const sub   = _secEl('secMaintenanceSub');
  const btn   = _secEl('secMaintenanceBtn');
  if (!dot) return;
  if (_sec.maintenanceOn) {
    dot.className   = 'sec-maintenance-dot on';
    if (label) label.textContent = '⚠️ MAINTENANCE MODE ON';
    if (sub)   sub.textContent   = 'Public site is locked. Only admins can access.';
    if (btn)   { btn.textContent = '✓ Disable Maintenance'; btn.className = 'admin-btn admin-btn-primary'; }
  } else {
    dot.className   = 'sec-maintenance-dot off';
    if (label) label.textContent = 'Site is LIVE';
    if (sub)   sub.textContent   = 'Public can access the site normally.';
    if (btn)   { btn.textContent = '🛠️ Enable Maintenance'; btn.className = 'admin-btn admin-btn-danger'; }
  }
}

async function secToggleMaintenance() {
  const newVal = !_sec.maintenanceOn;
  if (newVal && !confirm('Enable maintenance mode? The public site will be locked for all visitors.')) return;
  try {
    const res = await fetch(apiUrl('/api/admin/maintenance'), {
      method: 'POST',
      headers: _secAuthHeaders(),
      body: JSON.stringify({ enabled: newVal }),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success || res.ok) {
      _sec.maintenanceOn = newVal;
      _secRenderMaintenanceStatus();
      showNotification(newVal ? 'info' : 'success', newVal ? 'Maintenance ON' : 'Site is Live', newVal ? 'Public access is now blocked.' : 'Maintenance mode disabled.');
      _secPushAudit(newVal ? 'Maintenance mode ENABLED' : 'Maintenance mode DISABLED', '', 'warn');
    } else {
      showNotification('error', 'Failed', data.error || 'Could not toggle maintenance mode.');
    }
  } catch (e) {
    // Fallback: persist in settings
    _sec.maintenanceOn = newVal;
    _secRenderMaintenanceStatus();
    showNotification('info', 'Stored Locally', 'Maintenance state saved locally (API endpoint not available).');
    _secPushAudit(newVal ? 'Maintenance mode ENABLED (local)' : 'Maintenance mode DISABLED (local)', '', 'warn');
  }
}

function _secCardExport() {
  return `
  <div class="sec-card">
    <div class="sec-card-header">
      <div class="sec-card-icon">📦</div>
      <div>
        <div class="sec-card-title">Export All Data</div>
        <div class="sec-card-desc">Download a full backup of all memories, settings, comments, reactions, and dedications.</div>
      </div>
    </div>
    <div class="callout" style="margin:0;">
      The export will include a ZIP of all approved media files and a JSON metadata file.
    </div>
    <div class="sec-export-progress" id="secExportProgress">
      <div class="progress-bar"><div class="progress-fill" id="secExportBar" style="width:0%;"></div></div>
      <div class="progress-text" id="secExportProgressText">Preparing export…</div>
    </div>
    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <button class="admin-btn admin-btn-secondary" onclick="secExportJSON()" style="flex:1; justify-content:center;">📄 Export JSON</button>
      <button class="admin-btn admin-btn-primary"   onclick="secExportZIP()"  style="flex:1; justify-content:center;">📦 Export ZIP</button>
    </div>
  </div>`;
}

async function secExportJSON() {
  try {
    const res = await fetch(apiUrl('/api/admin/export/json'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (!res.ok) throw new Error('Export failed: ' + res.status);
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `farewell_backup_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    showNotification('success', 'Export Ready', 'JSON backup downloaded.');
    _secPushAudit('Data exported (JSON)', '', 'ok');
  } catch (e) {
    showNotification('error', 'Export Failed', e.message);
  }
}

async function secExportZIP() {
  const progress = _secEl('secExportProgress');
  const bar      = _secEl('secExportBar');
  const txt      = _secEl('secExportProgressText');
  if (progress) progress.classList.add('visible');
  if (bar) bar.style.width = '20%';
  if (txt) txt.textContent = 'Requesting ZIP from server…';
  try {
    const res = await fetch(apiUrl('/api/admin/export/zip'), { headers: _secAuthHeaders() });
    if (res.status === 401) { adminLogout(); return; }
    if (!res.ok) throw new Error('Export failed: ' + res.status);
    if (bar) bar.style.width = '70%';
    if (txt) txt.textContent = 'Downloading…';
    const blob = await res.blob();
    if (bar) bar.style.width = '100%';
    if (txt) txt.textContent = 'Done!';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `farewell_backup_${Date.now()}.zip`;
    a.click();
    URL.revokeObjectURL(a.href);
    showNotification('success', 'Export Ready', 'ZIP backup downloaded.');
    _secPushAudit('Data exported (ZIP)', '', 'ok');
    setTimeout(() => { if (progress) progress.classList.remove('visible'); if (bar) bar.style.width = '0%'; }, 2000);
  } catch (e) {
    if (progress) progress.classList.remove('visible');
    showNotification('error', 'Export Failed', e.message);
  }
}

function _secCardWipeMemories() {
  return `

      <div class="sec-card-icon">🗑️</div>
      <div>
        <div class="sec-card-title">Danger Zone</div>

async function secWipeAllMemories() {
  const confirm1 = _secEl('secWipeConfirm')?.value?.trim();
  if (confirm1 !== 'DELETE ALL') {
    showNotification('error', 'Confirmation Required', 'Type DELETE ALL in the box to confirm.');
    return;
  }
  if (!confirm('FINAL WARNING: This will permanently delete ALL memories, photos, and videos. There is NO undo. Are you absolutely sure?')) return;
  if (!confirm('Last chance — are you really, truly sure you want to wipe everything?')) return;

  try {
    const res = await fetch(apiUrl('/api/admin/wipe-memories'), {
      method: 'DELETE',
      headers: _secAuthHeaders(),
    });
    if (res.status === 401) { adminLogout(); return; }
    const data = await res.json();
    if (data.success || res.ok) {
      showNotification('success', 'Wiped', 'All memories have been permanently deleted.');
      _secPushAudit('⚠️ ALL MEMORIES WIPED', `By: ${state.adminUser?.userId || 'admin'}`, 'fail');
      if (_secEl('secWipeConfirm')) _secEl('secWipeConfirm').value = '';
    } else {
      showNotification('error', 'Failed', data.error || 'Could not wipe memories.');
    }
  } catch (e) {
    showNotification('error', 'Error', e.message);
  }
}
