<!-- FRAGMENT: compilations -->
<style data-fragment-style="compilations">
/* Player overlay */
.compilation-player-overlay { 
 position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
 background: #000; z-index: 8000; display: none; 
 align-items: center; justify-content: center; 
}
.compilation-player-overlay.active { display: flex !important; }

/* Slides */
.compilation-slide { 
 position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
 display: flex; align-items: center; justify-content: center; 
 flex-direction: column; opacity: 0; 
 transition: opacity 0.8s ease, transform 0.8s ease; 
 pointer-events: none; 
}
.compilation-slide.active { opacity: 1; pointer-events: auto; }
.compilation-slide img { 
 max-width: 90%; max-height: 80vh; object-fit: contain; 
 border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
}

/* Caption */
.compilation-caption { 
 position: absolute; bottom: 80px; left: 50%; 
 transform: translateX(-50%); 
 background: rgba(0,0,0,0.75); padding: 16px 32px; 
 border-radius: 20px; color: white; font-size: 1.3rem; 
 max-width: 85%; text-align: center; 
 backdrop-filter: blur(10px); 
 border: 1px solid rgba(255,255,255,0.1); 
}

/* Nav buttons */
.compilation-nav-btn { 
 position: absolute; top: 50%; transform: translateY(-50%); 
 background: rgba(255,255,255,0.1); 
 border: 1px solid rgba(255,255,255,0.2); 
 color: white; width: 60px; height: 60px; 
 border-radius: 50%; cursor: pointer; font-size: 1.5rem; 
 transition: var(--transition-smooth); 
 display: flex; align-items: center; justify-content: center; 
}
.compilation-nav-btn:hover { 
 background: var(--primary-gold); 
 color: var(--navy-dark); 
}
.compilation-prev { left: 30px; }
.compilation-next { right: 30px; }

/* Close button */
.compilation-close { 
 position: absolute; top: 20px; right: 20px; 
 background: rgba(255,255,255,0.1); 
 border: 1px solid rgba(255,255,255,0.2); 
 color: white; width: 50px; height: 50px; 
 border-radius: 50%; cursor: pointer; font-size: 1.3rem; 
 display: flex; align-items: center; justify-content: center; 
 z-index: 8001; 
}
.compilation-close:hover { background: rgba(244,67,54,0.8); }

/* Progress dots */
.compilation-progress { 
 position: absolute; bottom: 25px; left: 50%; 
 transform: translateX(-50%); display: flex; gap: 10px; 
}
.compilation-dot { 
 width: 12px; height: 12px; 
 background: rgba(255,255,255,0.3); 
 border-radius: 50%; cursor: pointer; 
 transition: var(--transition-smooth); 
}
.compilation-dot:hover { background: rgba(255,255,255,0.6); }
.compilation-dot.active { 
 background: var(--primary-gold); 
 transform: scale(1.3); 
}

/* Transition variants */
.compilation-slide.trans-slide { transform: translateX(100%); }
.compilation-slide.trans-slide.active { transform: translateX(0); }
.compilation-slide.trans-zoom { transform: scale(0.7); }
.compilation-slide.trans-zoom.active { transform: scale(1); }
.compilation-slide.trans-flip { transform: rotateY(90deg); }
.compilation-slide.trans-flip.active { transform: rotateY(0); }
.compilation-slide.trans-blur { filter: blur(20px); }
.compilation-slide.trans-blur.active { filter: blur(0); }

/* Creator modal */
.compilation-modal { 
 position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
 background: rgba(0,0,0,0.9); z-index: 7000; display: none; 
 align-items: flex-start; justify-content: center; 
 padding: 40px 20px; overflow-y: auto; 
}
.compilation-modal.active { display: flex !important; }

.compilation-modal-content { 
 background: var(--navy-medium); 
 border: 1px solid var(--glass-border); 
 border-radius: 20px; padding: 30px; 
 max-width: 1200px; width: 100%; 
 margin-top: 5vh; box-sizing: border-box; 
}

.compilation-photo-grid { 
 display: grid; 
 grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
 gap: 10px; max-height: 380px; overflow-y: auto; 
 padding: 10px; background: rgba(0,0,0,0.2); 
 border-radius: 12px; margin: 15px 0; 
 align-content: start; 
}

.compilation-photo-item { 
 position: relative; aspect-ratio: 1; 
 border-radius: 10px; overflow: hidden; 
 cursor: pointer; border: 3px solid transparent; 
 transition: var(--transition-smooth); 
}
.compilation-photo-item:hover { 
 border-color: rgba(212,175,55,0.5); 
}
.compilation-photo-item.selected { 
 border-color: var(--primary-gold); 
}
.compilation-photo-item img { 
 width: 100%; height: 100%; object-fit: cover; 
}
.compilation-photo-item .photo-check { 
 position: absolute; top: 5px; right: 5px; 
 width: 24px; height: 24px; 
 background: var(--primary-gold); 
 border-radius: 50%; display: none; 
 align-items: center; justify-content: center; 
 color: var(--navy-dark); font-weight: bold; 
}
.compilation-photo-item.selected .photo-check { 
 display: flex; 
}

.compilation-slides-preview { 
 display: flex; flex-wrap: nowrap; gap: 12px; 
 overflow-x: auto; overflow-y: hidden; 
 padding: 15px 12px; min-height: 200px; 
 background: rgba(0,0,0,0.15); 
 border-radius: 12px; margin: 15px 0; 
 align-items: flex-start; 
 scrollbar-width: thin; 
 scrollbar-color: var(--primary-gold) transparent; 
}

.compilation-slide-preview { 
 flex-shrink: 0; width: 120px; 
 background: rgba(255,255,255,0.05); 
 border: 1px solid var(--glass-border); 
 border-radius: 10px; padding: 8px; 
 cursor: grab; box-sizing: border-box; 
 display: flex; flex-direction: column; gap: 4px; 
}
.compilation-slide-preview img { 
 width: 100%; aspect-ratio: 1; 
 object-fit: cover; border-radius: 6px; 
}
.compilation-slide-preview input { 
 width: 100%; margin-top: 0; 
 padding: 4px 6px; font-size: 0.75rem; 
 background: rgba(0,0,0,0.3); 
 border: 1px solid var(--glass-border); 
 border-radius: 4px; color: white; 
 box-sizing: border-box; 
}
.compilation-slide-preview .remove-slide { 
 display: block; width: 100%; 
 margin-top: auto; padding: 5px 4px; 
 background: rgba(244,67,54,0.3); 
 border: none; border-radius: 4px; 
 color: #ffb3ad; cursor: pointer; 
 font-size: 0.7rem; box-sizing: border-box; 
 text-align: center; 
}

/* Compilations grid for public section */
.compilations-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
 gap: 20px;
 margin-top: 30px;
}

.compilation-card {
 background: var(--glass-bg);
 border: 1px solid var(--glass-border);
 border-radius: 20px;
 padding: 25px;
 transition: var(--transition-smooth);
 cursor: pointer;
}

.compilation-card:hover {
 border-color: var(--primary-gold);
 transform: translateY(-5px);
}

.compilation-card-header {
 display: flex;
 align-items: center;
 gap: 15px;
 margin-bottom: 15px;
}

.compilation-icon {
 font-size: 2.5rem;
}

.compilation-card-info h3 {
 font-family: var(--font-display);
 color: var(--primary-gold);
 font-size: 1.3rem;
 margin-bottom: 5px;
}

.compilation-card-meta {
 color: var(--text-muted);
 font-size: 0.9rem;
}

.compilation-card-description {
 color: var(--text-light);
 margin-bottom: 15px;
 line-height: 1.6;
}

/* Responsive: stack columns on mobile */
@media (max-width: 768px) {
 .compilation-modal-content { padding: 20px 15px; }
 .compilation-creator-body { grid-template-columns: 1fr !important; }
 .compilation-photo-grid { 
  max-height: 260px; 
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
 }
 .compilation-slides-preview { min-height: 160px; }
 .compilations-grid {
  grid-template-columns: 1fr;
 }
}
</style>

<div class="compilation-player-overlay" id="compilationPlayer">

 <button class="compilation-nav-btn compilation-next" onclick="nextCompilationSlide()">❯</button>

<script data-fragment-script="compilations">
// ═══════════════════════════════════════════════════════════════════════════════
// MEMORY COMPILATIONS - COMPLETE SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════

// State
let currentCompilation = null;
let currentSlideIndex = 0;
let compilationTimer = null;
let compSelectedSlides = [];
let compEditingId = null;
let compAvailableMemories = [];

// ═══════════════════════════════════════════════════════════════════════════════
// PUBLIC COMPILATIONS LOADING
// ═══════════════════════════════════════════════════════════════════════════════

async function loadPublicCompilations() {
 const section = document.getElementById('compilations');
 const grid = document.getElementById('publicCompilationsGrid');
 
 if (!section || !grid) {
  console.log('⚠️ Compilations section not found');
  return;
 }

 try {
  const res = await fetch(apiUrl('/api/compilations'));
  const data = await res.json();

  if (!data.success || !data.compilations || data.compilations.length === 0) {
   section.style.display = 'none';
   console.log('ℹ️ No compilations available');
   return;
  }

  section.style.display = 'block';
  
  grid.innerHTML = data.compilations.map(comp => `
   <div class="compilation-card" onclick="playCompilation(${comp.id})">
    <div class="compilation-card-header">
     <div class="compilation-icon">🎬</div>
     <div class="compilation-card-info">
      <h3>${escapeHtml(comp.name || 'Compilation')}</h3>
      <div class="compilation-card-meta">
       ${comp.slides?.length || 0} slides • ${escapeHtml(comp.displayMode || 'auto')} mode
      </div>
     </div>
    </div>
    <div class="compilation-card-description">
     Transition: ${escapeHtml(comp.transitionType || 'fade')}
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="event.stopPropagation(); playCompilation(${comp.id})">
     ▶️ Play Compilation
    </button>
   </div>
  `).join('');

  console.log('✅ Loaded', data.compilations.length, 'compilations');

 } catch (e) {
  console.error('❌ Failed to load compilations:', e);
  section.style.display = 'none';
 }
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMPILATION PLAYER
// ═══════════════════════════════════════════════════════════════════════════════

async function playCompilation(compilationId) {
 try {
  const res = await fetch(apiUrl('/api/compilations/' + compilationId));
  const data = await res.json();

  if (!data.success || !data.compilation) {
   showNotification('error', 'Error', 'Could not load compilation');
   return;
  }

  currentCompilation = data.compilation;
  currentSlideIndex = 0;
  
  renderCompilationSlides();
  
  const player = document.getElementById('compilationPlayer');
  if (player) player.classList.add('active');
  document.body.style.overflow = 'hidden';
  
  showCompilationSlide(0);
  
 } catch (e) {
  console.error('❌ Play compilation error:', e);
  showNotification('error', 'Error', e.message);
 }
}

function renderCompilationSlides() {
 const container = document.getElementById('compilationSlides');
 const progress = document.getElementById('compilationProgress');
 
 if (!container || !currentCompilation) return;

 const transClass = 'trans-' + (currentCompilation.transitionType || 'fade');
 
 container.innerHTML = currentCompilation.slides.map((slide, i) => {
  // Try to find memory in available memories or fallback to slide's file_url
  const memory = compAvailableMemories.find(m => m.id === slide.memoryId) 
                || (state.memories || []).find(m => m.id === slide.memoryId);
  
  const rawUrl = slide.file_url || (memory ? memory.file_url : '');
  const imgUrl = rawUrl ? mediaUrl(rawUrl) : '';
  
  return `
   <div class="compilation-slide ${transClass}" data-index="${i}">
    <img src="${imgUrl}" alt="Memory" onerror="this.style.display='none'"/>
    ${slide.caption ? `<div class="compilation-caption">${escapeHtml(slide.caption)}</div>` : ''}
   </div>
  `;
 }).join('');

 if (progress) {
  progress.innerHTML = currentCompilation.slides.map((_, i) =>
   `<div class="compilation-dot" onclick="goToCompilationSlide(${i})"></div>`
  ).join('');
 }
}

function showCompilationSlide(index) {
 if (!currentCompilation) return;
 
 currentSlideIndex = index;
 
 document.querySelectorAll('.compilation-slide').forEach((s, i) => 
  s.classList.toggle('active', i === index)
 );
 
 document.querySelectorAll('.compilation-dot').forEach((d, i) => 
  d.classList.toggle('active', i === index)
 );

 if (compilationTimer) clearTimeout(compilationTimer);

 if (currentCompilation.displayMode === 'auto') {
  const duration = (currentCompilation.slides[index]?.duration || 5) * 1000;
  compilationTimer = setTimeout(() => {
   if (currentSlideIndex < currentCompilation.slides.length - 1) {
    showCompilationSlide(currentSlideIndex + 1);
   } else {
    showCompilationSlide(0); // Loop back to start
   }
  }, duration);
 }
}

function nextCompilationSlide() {
 if (currentCompilation) {
  showCompilationSlide((currentSlideIndex + 1) % currentCompilation.slides.length);
 }
}

function prevCompilationSlide() {
 if (currentCompilation) {
  showCompilationSlide((currentSlideIndex - 1 + currentCompilation.slides.length) % currentCompilation.slides.length);
 }
}

function goToCompilationSlide(index) {
 showCompilationSlide(index);
}

function closeCompilationPlayer() {
 if (compilationTimer) clearTimeout(compilationTimer);
 
 const player = document.getElementById('compilationPlayer');
 if (player) player.classList.remove('active');
 
 document.body.style.overflow = '';
 currentCompilation = null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// COMPILATION CREATOR (ADMIN)
// ═══════════════════════════════════════════════════════════════════════════════

function openCompilationCreator(editId = null) {
 compEditingId = editId;
 compSelectedSlides = [];
 
 document.getElementById('compName').value = '';
 document.getElementById('compDisplayMode').value = 'auto';
 document.getElementById('compTransition').value = 'fade';
 document.getElementById('compDefaultDuration').value = '5';
 
 loadCompPhotoGrid();
 renderCompSlidesPreview();
 
 document.getElementById('compilationCreatorModal').classList.add('active');
}

function closeCompilationCreator() {
 document.getElementById('compilationCreatorModal').classList.remove('active');
 compSelectedSlides = [];
 compEditingId = null;
}

async function loadCompPhotoGrid() {
 const grid = document.getElementById('compPhotoGrid');
 if (!grid) return;

 try {
  const res = await fetch(apiUrl('/api/admin/memories?limit=5000&filter=approved'), {
   headers: { 'Authorization': 'Bearer ' + state.adminToken }
  });
  
  const data = await res.json();
  
  if (!data.success) {
   grid.innerHTML = '<div class="mini-pill">Failed to load memories</div>';
   return;
  }

  const memories = (data.memories || []).filter(m => m.file_type === 'image');
  compAvailableMemories = memories;

  if (memories.length === 0) {
   grid.innerHTML = '<div class="mini-pill">No approved photos available</div>';
   return;
  }

  grid.innerHTML = memories.map(m => `
   <div class="compilation-photo-item" data-id="${m.id}" onclick="toggleCompPhoto(${m.id})">
    <img src="${mediaUrl(m.file_url)}" alt="" />
    <div class="photo-check">✓</div>
   </div>
  `).join('');

 } catch (e) {
  console.error('❌ Load photo grid error:', e);
  grid.innerHTML = '<div class="mini-pill">Error loading photos</div>';
 }
}

function toggleCompPhoto(memoryId) {
 const idx = compSelectedSlides.findIndex(s => s.memoryId === memoryId);
 
 if (idx >= 0) {
  compSelectedSlides.splice(idx, 1);
 } else {
  compSelectedSlides.push({
   memoryId,
   caption: '',
   duration: parseInt(document.getElementById('compDefaultDuration').value) || 5
  });
 }
 
 updateCompPhotoSelection();
 renderCompSlidesPreview();
}

function updateCompPhotoSelection() {
 document.querySelectorAll('.compilation-photo-item').forEach(el => {
  el.classList.toggle('selected', 
   compSelectedSlides.some(s => s.memoryId === parseInt(el.dataset.id))
  );
 });
}

function renderCompSlidesPreview() {
 const preview = document.getElementById('compSlidesPreview');
 if (!preview) return;

 if (compSelectedSlides.length === 0) {
  preview.innerHTML = '<div class="mini-pill" style="margin:auto;">No slides selected yet</div>';
  return;
 }

 preview.innerHTML = compSelectedSlides.map((slide, i) => {
  const mem = compAvailableMemories.find(m => m.id === slide.memoryId) 
             || (state.memories || []).find(m => m.id === slide.memoryId);
  const imgUrl = mem ? mediaUrl(mem.file_url) : '';
  
  return `
   <div class="compilation-slide-preview" data-index="${i}">
    <img src="${imgUrl}" alt="" />
    <input type="text" placeholder="Caption..." value="${escapeAttr(slide.caption)}" 
           onchange="updateSlideCaption(${i}, this.value)" />
    <input type="number" min="1" max="60" value="${slide.duration}" 
           onchange="updateSlideDuration(${i}, this.value)" />
    <button class="remove-slide" onclick="removeCompSlide(${i})">Remove</button>
   </div>
  `;
 }).join('');
}

function updateSlideCaption(index, caption) {
 if (compSelectedSlides[index]) {
  compSelectedSlides[index].caption = caption;
 }
}

function updateSlideDuration(index, duration) {
 if (compSelectedSlides[index]) {
  compSelectedSlides[index].duration = Math.max(1, Math.min(60, parseInt(duration) || 5));
 }
}

function removeCompSlide(index) {
 compSelectedSlides.splice(index, 1);
 updateCompPhotoSelection();
 renderCompSlidesPreview();
}

async function saveCompilation() {
 const name = document.getElementById('compName').value.trim();
 
 if (!name) {
  showNotification('error', 'Name required', 'Enter a compilation name');
  return;
 }
 
 if (compSelectedSlides.length < 2) {
  showNotification('error', 'Need slides', 'Select at least 2 photos');
  return;
 }

 const payload = {
  name,
  slides: compSelectedSlides,
  displayMode: document.getElementById('compDisplayMode').value,
  transitionType: document.getElementById('compTransition').value
 };

 try {
  const url = compEditingId 
   ? apiUrl('/api/admin/compilations/' + compEditingId) 
   : apiUrl('/api/admin/compilations');
   
  const res = await fetch(url, {
   method: 'POST',
   headers: {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + state.adminToken
   },
   body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.success) {
   showNotification('success', 'Saved', compEditingId ? 'Compilation updated' : 'Compilation created');
   closeCompilationCreator();
   
   if (typeof loadCompilationsAdmin === 'function') loadCompilationsAdmin();
   loadPublicCompilations();
  } else {
   showNotification('error', 'Failed', data.error);
  }

 } catch (e) {
  console.error('❌ Save compilation error:', e);
  showNotification('error', 'Error', e.message);
 }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN PANEL FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

function renderCompilationsPanelHtml() {
 return `
  <div class="stat-card" style="text-align:left;">
   <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
    <h3 style="font-family:var(--font-display); color:var(--primary-gold); font-size:1.3rem;">🎬 Memory Compilations</h3>
    <div style="display:flex; gap:10px;">
     <button class="admin-btn admin-btn-secondary" onclick="loadCompilationsAdmin()">🔄 Refresh</button>
     <button class="admin-btn admin-btn-primary" onclick="openCompilationCreator()">➕ New Compilation</button>
    </div>
   </div>
   <div class="mini-pill" style="margin-top:12px;">Create photo slideshows with transitions and captions</div>
   <div id="compilationsListAdmin" style="margin-top:16px;"></div>
  </div>
 `;
}

async function loadCompilationsAdmin() {
 try {
  const res = await fetch(apiUrl('/api/compilations'));
  const data = await res.json();

  if (!data.success) return;

  const list = document.getElementById('compilationsListAdmin');
  if (!list) return;

  if (!data.compilations || !data.compilations.length) {
   list.innerHTML = '<div class="mini-pill">No compilations yet. Create your first one!</div>';
   return;
  }

  list.innerHTML = data.compilations.map(c => {
   const thumbs = c.slides.slice(0, 8).map(s => {
    const mem = compAvailableMemories.find(m => m.id === s.memoryId) 
               || (state.memories || []).find(m => m.id === s.memoryId);
    return mem ? `<img src="${mediaUrl(mem.file_url)}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;" />` : '';
   }).join('');

   return `
    <div class="admin-memory-card" style="padding:16px; margin-bottom:12px;">
     <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <div>
       <div style="font-weight:800; font-size:1.1rem;">${escapeHtml(c.name)}</div>
       <div style="color:var(--text-muted); font-size:0.85rem; margin-top:4px;">
        ${c.slides.length} slides • ${c.displayMode} mode • ${c.transitionType} transition
       </div>
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
       <button class="admin-btn admin-btn-primary" onclick="playCompilation(${c.id})">▶️ Play</button>
       <button class="admin-btn admin-btn-secondary" onclick="editCompilationAdmin(${c.id})">✏️ Edit</button>
       <button class="admin-btn admin-btn-danger" onclick="deleteCompilationAdmin(${c.id})">🗑️ Delete</button>
      </div>
     </div>
     <div style="display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding:8px 0;">
      ${thumbs}
      ${c.slides.length > 8 ? `<span class="mini-pill">+${c.slides.length - 8} more</span>` : ''}
     </div>
    </div>
   `;
  }).join('');

 } catch (e) {
  console.error('❌ Load compilations admin error:', e);
 }
}

async function editCompilationAdmin(id) {
 try {
  const res = await fetch(apiUrl('/api/compilations/' + id));
  const data = await res.json();

  if (!data.success || !data.compilation) return;

  compEditingId = id;
  compSelectedSlides = data.compilation.slides.map(s => ({
   memoryId: s.memoryId,
   caption: s.caption || '',
   duration: s.duration || 5
  }));

  document.getElementById('compName').value = data.compilation.name;
  document.getElementById('compDisplayMode').value = data.compilation.displayMode || 'auto';
  document.getElementById('compTransition').value = data.compilation.transitionType || 'fade';

  loadCompPhotoGrid();
  
  setTimeout(() => {
   updateCompPhotoSelection();
   renderCompSlidesPreview();
  }, 500);

  document.getElementById('compilationCreatorModal').classList.add('active');

 } catch (e) {
  console.error('❌ Edit compilation error:', e);
  showNotification('error', 'Error', e.message);
 }
}

async function deleteCompilationAdmin(id) {
 if (!confirm('Delete this compilation? This cannot be undone.')) return;

 try {
  const res = await fetch(apiUrl('/api/admin/compilations/' + id), {
   method: 'DELETE',
   headers: { 'Authorization': 'Bearer ' + state.adminToken }
  });

  const data = await res.json();

  if (data.success) {
   showNotification('success', 'Deleted', 'Compilation removed');
   loadCompilationsAdmin();
   loadPublicCompilations();
  } else {
   showNotification('error', 'Failed', data.error);
  }

 } catch (e) {
  console.error('❌ Delete compilation error:', e);
  showNotification('error', 'Error', e.message);
 }
}

function initCompilationsPanelContent() {
 const panel = document.getElementById('panelCompilations');
 if (!panel) {
  console.error('❌ panelCompilations not found');
  return;
 }

 if (panel.dataset.initialized !== 'true') {
  panel.innerHTML = renderCompilationsPanelHtml();
  panel.dataset.initialized = 'true';
 }

 loadCompilationsAdmin();
}
