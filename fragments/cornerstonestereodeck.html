<!-- FRAGMENT: stereodeck -->
<style data-fragment-style="stereodeck">
/* Floating Sleek Boombox */
#boomboxDock {
 position: fixed;
 bottom: 20px;
 right: 20px;
 z-index: 5000;
 transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
 display: flex;
 flex-direction: column;
 align-items: flex-end;
}
#boomboxDock.minimized {
 transform: translateY(calc(100% - 48px));
}
#boomboxToggle {
 background: var(--gradient-gold);
 color: var(--navy-dark);
 border: none;
 border-radius: 12px 12px 0 0;
 padding: 8px 20px;
 font-weight: bold;
 cursor: pointer;
 font-family: var(--font-body);
 box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
 font-size: 0.9rem;
 display: flex;
 align-items: center;
 gap: 8px;
}
#boomboxUnit {
 width: 320px;
 background: rgba(26, 26, 46, 0.95);
 backdrop-filter: blur(15px);
 border: 1px solid var(--primary-gold);
 border-radius: 16px 0 16px 16px;
 padding: 20px;
 box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}
.boombox-brand {
 font-family: var(--font-display);
 color: var(--primary-gold);
 font-size: 1.2rem;
 text-align: center;
 margin-bottom: 15px;
 border-bottom: 1px solid rgba(212,175,55,0.2);
 padding-bottom: 10px;
}
.boombox-door {
 height: 60px;
 border-radius: 10px;
 border: 1px solid rgba(255,255,255,0.1);
 background: #0a0a0c;
 display: flex;
 align-items: center;
 justify-content: center;
 color: var(--text-muted);
 font-size: 0.85rem;
 margin-bottom: 15px;
 overflow: hidden;
 position: relative;
}
.boombox-door.has-tape {
 border-color: var(--primary-gold);
 background: linear-gradient(90deg, #111, #222, #111);
}
.tape-spool {
 width: 30px; height: 30px;
 border: 2px solid #555;
 border-radius: 50%;
 border-top-color: #fff;
 animation: spin 2s linear infinite;
 position: absolute;
}
.tape-spool.left { left: 20px; }
.tape-spool.right { right: 20px; }

#cassetteRack {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap: 8px;
 margin-bottom: 15px;
}
.cassette {
 padding: 8px;
 border-radius: 8px;
 background: rgba(255,255,255,0.05);
 border: 1px solid rgba(255,255,255,0.1);
 color: var(--text-light);
 font-size: 0.8rem;
 cursor: pointer;
 transition: all 0.3s ease;
}
.cassette:hover, .cassette.active {
 background: rgba(212,175,55,0.2);
 border-color: var(--primary-gold);
 color: var(--primary-gold);
}
.boombox-controls {
 display: flex;
 gap: 10px;
}
.boombox-controls button {
 flex: 1;
 padding: 8px;
 border-radius: 8px;
 background: rgba(244,67,54,0.2);
 color: #ffb3ad;
 border: 1px solid rgba(244,67,54,0.4);
 cursor: pointer;
 transition: 0.3s;
 font-weight: bold;
}
.boombox-controls button:hover { background: rgba(244,67,54,0.4); }

/* Lean Back Mode */
#leanBackOverlay{position:fixed;inset:0;background:#000;z-index:9000;display:none;overflow:hidden;}
#leanBackOverlay.active{display:block;}
#leanBackStage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
#leanBackStage img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:16px;box-shadow:0 30px 100px rgba(0,0,0,0.7);transition:transform 7s ease,opacity 0.8s ease;}
#leanBackControls{position:absolute;left:20px;right:20px;bottom:20px;display:flex;justify-content:space-between;align-items:center;z-index:2;}
#leanBackStatus{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);color:#fff;padding:10px 16px;border-radius:999px;backdrop-filter:blur(12px);font-size:0.9rem;}
</style>

<div id="leanBackOverlay">
 <div id="leanBackStage"></div>
 <div id="leanBackControls">
 <div id="leanBackStatus">Lean Back Mode</div>
 <button class="btn btn-danger" onclick="stopLeanBackMode()" type="button">Exit</button>
 </div>
</div>

<div id="boomboxDock" class="minimized">
 <button id="boomboxToggle" onclick="document.getElementById('boomboxDock').classList.toggle('minimized')">
 📻 StereoDeck <span style="font-size:0.7rem;">▲/▼</span>
 </button>
 <div id="boomboxUnit">
 <div class="boombox-brand">Cornerstone Tunes</div>
 <div class="boombox-door" id="boomboxDoor">Pick a vibe below</div>
 <div id="cassetteRack"></div>
 <div class="boombox-controls">
 <button id="ejectTapeBtn" onclick="ejectTape()">⏏ Eject / Stop</button>
 </div>
 </div>
</div>

<script data-fragment-script="stereodeck">
(function() {
 const stereoState = { currentAudio: null, activeTape: null, leanBackTimer: null, leanBackIndex: 0, leanBackItems: [] };

 function initBoombox() {
 const rack = document.getElementById('cassetteRack');
 if (!rack || rack.dataset.built) return;
 rack.dataset.built = '1';
 
 const tapes = [
 { name: '🎓 Graduation Vibes', key: 'graduation' },
 { name: '🥺 Sad Boi Hours', key: 'sadboi' },
 { name: '🔥 Hype Track', key: 'hype' },
 { name: '✨ Lo-Fi Chill', key: 'lofi' } // Fallback
 ];

 tapes.forEach(tape => {
 const btn = document.createElement('button');
 btn.className = 'cassette';
 btn.textContent = tape.name;
 btn.onclick = () => playTape(tape.name, tape.key, btn);
 rack.appendChild(btn);
 });

 // Append Lean Back button to hero programmatically
 const heroBtns = document.querySelector('.hero-buttons');
 if(heroBtns && !document.getElementById('watchMovieBtn')) {
 const btn = document.createElement('button');
 btn.className = 'btn btn-secondary';
 btn.id = 'watchMovieBtn';
 btn.innerHTML = '🎬 Watch as Movie';
 btn.onclick = startLeanBackMode;
 heroBtns.appendChild(btn);
 }
 }

 function playTape(name, key, btnEl) {
 const door = document.getElementById('boomboxDoor');
 if(stereoState.currentAudio) { stereoState.currentAudio.pause(); stereoState.currentAudio = null; }
 
 document.querySelectorAll('.cassette').forEach(b => b.classList.remove('active'));
 btnEl.classList.add('active');

 const musicSettings = window.state?.settings?.music || {};
 const musicFile = musicSettings['boombox' + key.charAt(0).toUpperCase() + key.slice(1)] || `/music/${key}.mp3`; // fallback route

 try {
 stereoState.currentAudio = new Audio(musicFile);
 stereoState.currentAudio.loop = true;
 stereoState.currentAudio.volume = 0.4;
 stereoState.currentAudio.play().catch(e => console.log('Audio playback blocked until interaction', e));
 
 door.classList.add('has-tape');
 door.innerHTML = `
 <div class="tape-spool left"></div>
 <div style="text-align:center; z-index:2; font-weight:bold; color:var(--primary-gold);">${name}</div>
 <div class="tape-spool right"></div>
 `;
 } catch (e) { console.error('Audio fail', e); }
 }

 window.ejectTape = function() {
 if(stereoState.currentAudio) { stereoState.currentAudio.pause(); stereoState.currentAudio = null; }
 document.querySelectorAll('.cassette').forEach(b => b.classList.remove('active'));
 const door = document.getElementById('boomboxDoor');
 if(door) {
 door.classList.remove('has-tape');
 door.innerHTML = 'Music Stopped';
 }
 };

 window.startLeanBackMode = function() {
    const memories = (window.state?.memories || []).filter(m => m.file_type === 'image' && m.file_url);
    
    if (!memories.length) {
        if(typeof showNotification==='function') showNotification('info', 'No photos', 'Need approved photos first.');
        return;
    }
    
    // Process URLs through mediaUrl if available
    stereoState.leanBackItems = memories.map(m => ({
        ...m,
        file_url: typeof mediaUrl === 'function' ? mediaUrl(m.file_url) : m.file_url
    }));
    
    document.getElementById('leanBackOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    stereoState.leanBackIndex = 0;
    showLeanBackSlide();
};

 window.stopLeanBackMode = function() {
 clearTimeout(stereoState.leanBackTimer);
 document.getElementById('leanBackOverlay').classList.remove('active');
 document.body.style.overflow = '';
 };

 function showLeanBackSlide() {
 const stage = document.getElementById('leanBackStage');
 if (!stage || !stereoState.leanBackItems.length) return;
 const item = stereoState.leanBackItems[stereoState.leanBackIndex % stereoState.leanBackItems.length];
 
 stage.innerHTML = '';
 const img = document.createElement('img');
 img.src = item.file_url;
 img.style.opacity = '0';
 img.style.transform = 'scale(1.05)';
 stage.appendChild(img);
 
 requestAnimationFrame(() => {
 img.style.opacity = '1';
 img.style.transform = 'scale(1.15)';
 });

 const status = document.getElementById('leanBackStatus');
 if (status) status.textContent = `Movie Mode • ${stereoState.leanBackIndex + 1} / ${stereoState.leanBackItems.length}`;

 stereoState.leanBackTimer = setTimeout(() => {
 stereoState.leanBackIndex++;
 showLeanBackSlide();
 }, 5000);
 }

 document.addEventListener('DOMContentLoaded', () => setTimeout(initBoombox, 1000));
})();
</script>
