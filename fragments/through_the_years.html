<!-- FRAGMENT: timeline -->
<style data-fragment-style="timeline">
#timeline { background: var(--navy-medium); }
.timeline { position: relative; max-width: 800px; margin: 0 auto; }
.timeline::before { content: ""; position: absolute; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: var(--gradient-gold); border-radius: 2px; }
.timeline-item { display: flex; justify-content: flex-end; padding-right: 50%; position: relative; margin-bottom: 50px; }
.timeline-item:nth-child(even) { justify-content: flex-start; padding-right: 0; padding-left: 50%; }
.timeline-content { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; max-width: 350px; position: relative; margin-right: 30px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
.timeline-content:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.timeline-item:nth-child(even) .timeline-content { margin-right: 0; margin-left: 30px; }
.timeline-dot { position: absolute; right: -38px; top: 25px; width: 20px; height: 20px; background: var(--primary-gold); border-radius: 50%; border: 4px solid var(--navy-medium); box-shadow: 0 0 15px rgba(212,175,55,0.4); }
.timeline-item:nth-child(even) .timeline-dot { right: auto; left: -38px; }
.timeline-year { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--primary-gold); margin-bottom: 10px; }
.timeline-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 10px; color: var(--text-light); }
.timeline-description { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; }
.timeline-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
@media (max-width: 1024px) {
 .timeline::before { left: 20px; }
 .timeline-item { padding-right: 0; padding-left: 50px; justify-content: flex-start; }
 .timeline-item:nth-child(even) { padding-left: 50px; }
 .timeline-content { margin-right: 0; margin-left: 0; max-width: 100%; }
 .timeline-item:nth-child(even) .timeline-content { margin-left: 0; }
 .timeline-dot { left: 12px; right: auto; }
 .timeline-item:nth-child(even) .timeline-dot { left: 12px; }
}
</style>
<section id="timeline">
 <div class="container">
 <div class="section-header">
 <span class="section-badge" id="uiTimelineBadge">Our Journey</span>
 <h2 class="section-title" id="uiTimelineTitle">Through The <span class="highlight">Years</span></h2>
 <p class="section-description" id="uiTimelineDesc">Key milestones of our school journey</p>
 </div>
 <div class="timeline" id="timelineList">
 <div class="loading-spinner"></div>
 </div>
 </div>
</section>

<script data-fragment-script="timeline">
(function() {
 const DEFAULT_TIMELINE = [
 { year: '2015', title: 'The Beginning', description: 'Our journey started here.' },
 { year: '2025', title: 'Farewell', description: 'Memories to last a lifetime.' }
 ];

 async function forceLoadTimeline() {
 const container = document.getElementById('timelineList');
 if (!container) return;

 let timeline = DEFAULT_TIMELINE;
 try {
 // Force a fresh fetch from the API to guarantee we don't show old data
 const res = await fetch(apiUrl('/api/settings'));
 const data = await res.json();
 if (data.success && data.settings?.timeline?.length > 0) {
 timeline = data.settings.timeline;
 }
 } catch (e) {
 console.warn('Timeline fetch failed, using defaults', e);
 }

 timeline = timeline.filter(item => item && item.year && item.title);
 timeline.sort((a, b) => parseInt(a.year) - parseInt(b.year));

 if (timeline.length === 0) {
 container.innerHTML = `<div class="timeline-empty"><p>No timeline events yet.</p></div>`;
 return;
 }

 container.innerHTML = timeline.map((item, index) => `
 <div class="timeline-item" style="animation: fadeInUp 0.6s ease ${index * 0.1}s both;">
 <div class="timeline-content">
 <div class="timeline-year">${escapeHtml(item.year)}</div>
 <div class="timeline-title">${escapeHtml(item.title)}</div>
 <div class="timeline-description">${escapeHtml(item.description || '')}</div>
 </div>
 <div class="timeline-dot"></div>
 </div>
 `).join('');
 }

 document.addEventListener('DOMContentLoaded', forceLoadTimeline);
 window.addEventListener('settingsUpdated', forceLoadTimeline);
})();
</script>
