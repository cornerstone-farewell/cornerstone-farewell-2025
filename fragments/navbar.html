<script data-fragment-script="navbar">
// ═══════════════════════════════════════════════════════════════════════════════
// NAVBAR - SCROLL EFFECT + MOBILE MENU + ADMIN ACCESS
// ═══════════════════════════════════════════════════════════════════════════════

(function() {
  let logoClickCount = 0;
  let logoClickTimer = null;

  function initNavbar() {
    const navbar = document.getElementById('navbar');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    const logo = document.getElementById('logo');

    if (!navbar) return;

    // ═══════════════════════════════════════════════════════════════════════
    // SCROLL EFFECT - Transparent → Solid
    // ═══════════════════════════════════════════════════════════════════════
    function handleScroll() {
      const scrollY = window.scrollY || window.pageYOffset;
      
      if (scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    }

    // Initial check
    handleScroll();

    // Listen for scroll
    window.addEventListener('scroll', handleScroll, { passive: true });

    // ═══════════════════════════════════════════════════════════════════════
    // MOBILE MENU TOGGLE
    // ═══════════════════════════════════════════════════════════════════════
    if (mobileMenuBtn && navLinks) {
      mobileMenuBtn.addEventListener('click', () => {
        mobileMenuBtn.classList.toggle('active');
        navLinks.classList.toggle('active');
      });

      // Close mobile menu when clicking a link
      navLinks.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenuBtn.classList.remove('active');
          navLinks.classList.remove('active');
        });
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // ADMIN ACCESS - 5 CLICKS ON LOGO
    // ═══════════════════════════════════════════════════════════════════════
    if (logo) {
      logo.addEventListener('click', () => {
        logoClickCount++;
        
        // Reset after 2 seconds of no clicks
        clearTimeout(logoClickTimer);
        logoClickTimer = setTimeout(() => {
          logoClickCount = 0;
        }, 2000);

        // Open admin login after 5 clicks
        if (logoClickCount >= 5) {
          logoClickCount = 0;
          clearTimeout(logoClickTimer);
          
          if (typeof openAdminLogin === 'function') {
            openAdminLogin();
          } else {
            // Fallback: directly show admin overlay
            const adminOverlay = document.getElementById('adminOverlay');
            if (adminOverlay) {
              adminOverlay.classList.add('active');
            }
          }
        }
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // SMOOTH SCROLL FOR ANCHOR LINKS
    // ═══════════════════════════════════════════════════════════════════════
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        const targetId = this.getAttribute('href');
        if (targetId === '#') return;
        
        const targetElement = document.querySelector(targetId);
        if (targetElement) {
          e.preventDefault();
          
          const navbarHeight = navbar.offsetHeight;
          const targetPosition = targetElement.getBoundingClientRect().top + window.pageYOffset - navbarHeight - 20;
          
          window.scrollTo({
            top: targetPosition,
            behavior: 'smooth'
          });
        }
      });
    });
  }

  // Initialize when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initNavbar);
  } else {
    initNavbar();
  }

  // Expose for external use
  window.initNavbar = initNavbar;
})();

// ═══════════════════════════════════════════════════════════════════════════════
// ADMIN LOGIN FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

function openAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) {
    overlay.classList.add('active');
    const userIdInput = document.getElementById('adminUserId');
    if (userIdInput) userIdInput.focus();
  }
}

function closeAdminLogin() {
  const overlay = document.getElementById('adminOverlay');
  if (overlay) {
    overlay.classList.remove('active');
  }
  const errorEl = document.getElementById('adminLoginError');
  if (errorEl) errorEl.classList.remove('active');
}

async function adminLogin() {
  const userId = document.getElementById('adminUserId')?.value?.trim() || 'super';
  const password = document.getElementById('adminPassword')?.value?.trim();
  const errorEl = document.getElementById('adminLoginError');

  if (!password) {
    if (errorEl) {
      errorEl.textContent = 'Please enter a password.';
      errorEl.classList.add('active');
    }
    return;
  }

  try {
    const res = await fetch(apiUrl('/api/admin/login'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, password })
    });

    const data = await res.json();

    if (data.success && data.token) {
      state.adminToken = data.token;
      state.adminUser = data.user;
      localStorage.setItem('adminToken', data.token);
      
      closeAdminLogin();
      openAdminDashboard();
      
      if (typeof showNotification === 'function') {
        showNotification('success', 'Welcome!', `Logged in as ${data.user?.name || userId}`);
      }
    } else {
      if (errorEl) {
        errorEl.textContent = data.error || 'Invalid credentials. Please try again.';
        errorEl.classList.add('active');
      }
    }
  } catch (e) {
    console.error('Login error:', e);
    if (errorEl) {
      errorEl.textContent = 'Connection error. Please try again.';
      errorEl.classList.add('active');
    }
  }
}

function openAdminDashboard() {
  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) {
    dashboard.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    // Load admin data
    if (typeof loadAdminMemories === 'function') {
      loadAdminMemories(true);
    }
    if (typeof buildAdminPanels === 'function') {
      buildAdminPanels();
    }
  }
}

function adminLogout() {
  state.adminToken = null;
  state.adminUser = null;
  localStorage.removeItem('adminToken');
  
  const dashboard = document.getElementById('adminDashboard');
  if (dashboard) {
    dashboard.classList.remove('active');
  }
  document.body.style.overflow = '';
  
  if (typeof showNotification === 'function') {
    showNotification('info', 'Logged Out', 'You have been logged out.');
  }
}

// Check for existing session on load
(function checkExistingSession() {
  const token = localStorage.getItem('adminToken');
  if (token && state) {
    state.adminToken = token;
  }
})();

// ═══════════════════════════════════════════════════════════════════════
// FEATURE TUTORIAL SYSTEM
// ═══════════════════════════════════════════════════════════════════════

window.startTutorial = function() {
    const steps = [
        { target: '#upload', title: 'Upload Memories', text: 'Share your favorite photos and videos from school here.' },
        { target: '#memories', title: 'Memory Wall', text: 'View, like, and comment on memories shared by your friends.' },
        { target: '#distanceMapSection', title: 'Destinations Globe', text: 'Pin your future university and see where everyone is going!' },
        { target: '#gratitudeWall', title: 'Fun Features', text: 'Leave advice, dedicate songs, and drop wishes in the jar.' },
        { target: '#logo', title: 'Admin Access', text: 'Admins: Click the logo 5 times rapidly to access the moderation dashboard.' }
    ];

    let currentStep = 0;

    function showStep() {

        if (currentStep >= steps.length) { 
            closeTutorial(); 
            return; 
        }

        const step = steps[currentStep];
        const el = document.querySelector(step.target);

        if (!el) { 
            console.warn('Tutorial target not found:', step.target);
            currentStep++; 
            showStep(); 
            return; 
        }

        el.scrollIntoView({ behavior: 'smooth', block: 'center' });

        setTimeout(() => {

            const rect = el.getBoundingClientRect();
            const validRect = rect.width > 0 && rect.height > 0;

            let overlay = document.getElementById('tutorialOverlay');

            if (!overlay) {

                overlay = document.createElement('div');
                overlay.id = 'tutorialOverlay';
                overlay.className = 'feature-tour-overlay active';
                document.body.appendChild(overlay);

                const spotlight = document.createElement('div');
                spotlight.id = 'tutorialSpotlight';
                spotlight.className = 'feature-tour-spotlight';
                overlay.appendChild(spotlight);

                const card = document.createElement('div');
                card.id = 'tutorialCard';
                card.className = 'feature-tour-card';
                overlay.appendChild(card);

            } else {
                overlay.classList.add('active');
            }

            const spotlight = document.getElementById('tutorialSpotlight');

            if (validRect) {

                spotlight.style.left = (rect.left - 5) + 'px';
                spotlight.style.top = (rect.top - 5) + 'px';
                spotlight.style.width = (rect.width + 10) + 'px';
                spotlight.style.height = (rect.height + 10) + 'px';
                spotlight.style.transform = 'none';

            } else {

                spotlight.style.left = '50%';
                spotlight.style.top = '50%';
                spotlight.style.width = '100px';
                spotlight.style.height = '100px';
                spotlight.style.transform = 'translate(-50%, -50%)';

            }

            const card = document.getElementById('tutorialCard');

            card.innerHTML = `
                <h3>${step.title}</h3>
                <p>${step.text}</p>
                <div class="feature-tour-actions">
                    <button class="btn btn-secondary" style="padding:8px 16px; font-size:0.85rem;" onclick="closeTutorial()">Skip Tour</button>
                    <button class="btn btn-primary" style="padding:8px 16px; font-size:0.85rem;" onclick="nextTutorialStep()">
                        ${currentStep === steps.length - 1 ? 'Finish ✓' : 'Next ➔'}
                    </button>
                </div>
            `;

            let cardLeft = Math.max(20, rect.left + (rect.width/2) - 180);
            let cardTop = rect.bottom + 20;

            if (cardTop + 200 > window.innerHeight) {
                cardTop = Math.max(20, rect.top - 180);
            }

            if (cardLeft + 360 > window.innerWidth) {
                cardLeft = window.innerWidth - 380;
            }

            card.style.left = cardLeft + 'px';
            card.style.top = cardTop + 'px';
            card.style.transform = 'none';

        }, 600);
    }

    window.nextTutorialStep = function() { 
        currentStep++; 
        showStep(); 
    };

    window.closeTutorial = function() { 
        const o = document.getElementById('tutorialOverlay'); 
        if (o) o.remove(); 
    };

    showStep();
};

</script>
